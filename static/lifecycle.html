<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LIFECYCLE — KRV FLEET SCORECARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --hl:     #a855f7;
  --mexc:   #f97316;
  --green:  #22c55e;
  --red:    #ef4444;
  --amber:  #f59e0b;
  --cyan:   #06b6d4;
  --white:  #ffffff;
  --bg:     #060610;
  --card:   #0b0b18;
  --border: #2a2a4a;
  --display: 'Bebas Neue', sans-serif;
  --mono:    'IBM Plex Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
  padding-bottom: 40px;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }

/* ── TOP BAR ── */
.lc-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 16px 16px 10px;
  flex-wrap: wrap;
}
.lc-title {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: .04em;
}
.lc-back {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  padding: 6px 14px;
}
.lc-updated {
  font-size: 16px;
  font-weight: 700;
  color: var(--green);
}
.lc-updated.stale { color: var(--red); }

/* ── VENUE SELECTOR ── */
.lc-filters {
  display: flex;
  gap: 8px;
  padding: 0 16px 14px;
  flex-wrap: wrap;
}
.lc-fp {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .06em;
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.3);
  background: transparent;
  color: var(--white);
  cursor: pointer;
}
.lc-fp.active {
  background: rgba(255,255,255,0.14);
  border-color: var(--white);
  box-shadow: 0 0 14px rgba(255,255,255,0.25);
}
.lc-fp.venue-hl.active   { border-color: var(--hl);   color: var(--hl);   box-shadow: 0 0 14px rgba(168,85,247,0.35); }
.lc-fp.venue-mexc.active { border-color: var(--mexc); color: var(--mexc); box-shadow: 0 0 14px rgba(249,115,22,0.35); }

/* ── SECTIONS ── */
.lc-section { padding: 10px 16px 4px; }
.lc-section-label {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--white);
  padding: 6px 0 12px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  margin-bottom: 12px;
}
.lc-empty {
  font-size: 16px;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
  padding: 20px 0;
  text-align: center;
}

/* ── OPEN TRADE CARDS ── */
.lc-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.lc-card {
  background: var(--card);
  border-radius: 10px;
  border-left: 3px solid var(--border);
  padding: 14px 16px 16px;
  cursor: pointer;
  transition: box-shadow .15s ease;
}
.lc-card:hover { box-shadow: 0 0 16px rgba(255,255,255,0.1); }
.lc-card.venue-hl   { border-left-color: var(--hl); }
.lc-card.venue-mexc { border-left-color: var(--mexc); }
.lc-card.is-open { animation: lcCardPulse 2.4s ease-in-out infinite; }
@keyframes lcCardPulse {
  0%, 100% { box-shadow: 0 0 0 rgba(255,255,255,0); }
  50%      { box-shadow: 0 0 16px rgba(255,255,255,0.08); }
}
.lc-card-head {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 10px;
}
.lc-pair {
  font-family: var(--display);
  font-size: 26px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: .04em;
}
.lc-dir { font-size: 14px; font-weight: 700; letter-spacing: .05em; }
.lc-dir.long  { color: var(--green); }
.lc-dir.short { color: var(--red); }
.lc-venue-pill {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .08em;
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid;
  margin-left: auto;
}
.lc-venue-pill.hl   { color: var(--hl);   border-color: var(--hl); }
.lc-venue-pill.mexc { color: var(--mexc); border-color: var(--mexc); }
.lc-row { display: flex; justify-content: space-between; font-size: 15px; font-weight: 700; padding: 3px 0; }
.lc-row .lbl { color: rgba(255,255,255,0.55); }
.lc-row .val { color: var(--white); }
.lc-row .val.pos { color: var(--green); }
.lc-row .val.neg { color: var(--red); }
.lc-tag {
  display: inline-block;
  font-family: var(--display);
  font-size: 13px;
  letter-spacing: .08em;
  padding: 2px 9px;
  border-radius: 10px;
  border: 1px solid var(--cyan);
  color: var(--cyan);
}

/* ── EXPIRED ALERTS TABLE ── */
.lc-table-wrap { overflow-x: auto; margin-bottom: 20px; }
.lc-table { width: 100%; border-collapse: collapse; min-width: 760px; }
.lc-table th {
  font-family: var(--display);
  font-size: 14px;
  letter-spacing: .08em;
  text-align: left;
  color: rgba(255,255,255,0.55);
  padding: 8px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
.lc-table td {
  font-size: 15px;
  font-weight: 700;
  padding: 9px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.lc-table tr { cursor: pointer; }
.lc-table tr:hover td { background: rgba(255,255,255,0.04); }
.lc-outcome {
  font-family: var(--display);
  font-size: 14px;
  letter-spacing: .06em;
  padding: 2px 9px;
  border-radius: 10px;
  border: 1px solid var(--amber);
  color: var(--amber);
}
.lc-outpills {
  display: flex;
  flex-wrap: wrap;
  padding: 0 0 12px;
}
.lc-outpill {
  font-family: var(--mono);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 700;
  border: 1px solid #2a2a4a;
  background: #0d0d1f;
  color: #ffffff;
  cursor: pointer;
  margin: 4px;
}
.lc-outpill.active {
  border-color: #06b6d4;
  color: #06b6d4;
}

/* ── CANDLE OVERLAY PANEL ── */
.lc-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.lc-overlay.open { display: flex; }
.lc-panel {
  background: var(--card);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  width: 100%;
  max-width: 920px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 20px;
}
.lc-panel-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.lc-panel-title { font-family: var(--display); font-size: 24px; letter-spacing: .04em; }
.lc-panel-close {
  margin-left: auto;
  font-family: var(--display);
  font-size: 16px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  padding: 5px 14px;
  background: transparent;
  color: var(--white);
  cursor: pointer;
}
.lc-panel-meta { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 18px; font-size: 15px; }
.lc-panel-meta .lbl { color: rgba(255,255,255,0.55); margin-right: 4px; }
.lc-chart-empty { font-size: 14px; font-weight: 700; color: #ffffff; padding: 40px 0; text-align: center; }

/* ── TIMEFRAME TABS / CANDLE TABLE ── */
.lc-tf-tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.lc-tf-tab {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .06em;
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.3);
  background: transparent;
  color: var(--white);
  cursor: pointer;
}
.lc-tf-tab.active {
  background: rgba(255,255,255,0.14);
  border-color: var(--white);
  box-shadow: 0 0 14px rgba(255,255,255,0.25);
}
</style>
</head>
<body>

<div class="lc-topbar">
  <div class="lc-title">TRADE LIFECYCLE</div>
  <a class="lc-back" href="/">&larr; BACK</a>
  <div class="lc-updated" id="lcUpdated">—</div>
</div>

<div class="lc-filters" id="lcFilters">
  <button class="lc-fp active" data-venue="all">ALL</button>
  <button class="lc-fp venue-hl" data-venue="hl">HL</button>
  <button class="lc-fp venue-mexc" data-venue="mexc">MEXC</button>
</div>

<div class="lc-section">
  <div class="lc-section-label">OPEN TRADES</div>
  <div class="lc-cards" id="lcOpenCards"><div class="lc-empty">Loading…</div></div>
</div>

<div class="lc-section">
  <div class="lc-section-label">FULL LIFECYCLE LOG</div>
  <div class="lc-outpills" id="lcOutcomeFilters">
    <button class="lc-outpill active" data-filter="ALL">ALL</button>
    <button class="lc-outpill" data-filter="CONFIRMED">CONFIRMED</button>
    <button class="lc-outpill" data-filter="EXPIRED">EXPIRED</button>
    <button class="lc-outpill" data-filter="J1H_BLOCKED">J1H BLOCKED</button>
    <button class="lc-outpill" data-filter="PEAK_DECAY">PEAK DECAY</button>
    <button class="lc-outpill" data-filter="CONFIRM_REVERSAL">CONFIRM REVERSAL</button>
    <button class="lc-outpill" data-filter="SIGNAL_EXHAUSTION">SIGNAL EXHAUSTION</button>
    <button class="lc-outpill" data-filter="KILL">KILL</button>
  </div>
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:0 0 14px">
    <input type="text" id="lcPairFilter" placeholder="FILTER PAIR..." style="
      background:#0d0d1f;
      border:1px solid #2a2a4a;
      color:#ffffff;
      font-size:14px;
      font-weight:700;
      font-family:'IBM Plex Mono',monospace;
      padding:6px 12px;
      border-radius:4px;
      width:180px;
      outline:none">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:14px;font-weight:700;color:#ffffff">FROM</span>
      <input type="date" id="lc-date-from" style="
        background:#0d0d1f;
        border:1px solid #2a2a4a;
        color:#ffffff;
        font-size:14px;
        font-weight:700;
        padding:6px 12px;
        border-radius:4px">
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:14px;font-weight:700;color:#ffffff">TO</span>
      <input type="date" id="lc-date-to" style="
        background:#0d0d1f;
        border:1px solid #2a2a4a;
        color:#ffffff;
        font-size:14px;
        font-weight:700;
        padding:6px 12px;
        border-radius:4px">
    </div>
  </div>
  <div class="lc-table-wrap">
    <table class="lc-table">
      <thead>
        <tr>
          <th>TIME</th><th>VENUE</th><th>PAIR</th><th>DIR</th><th>TIER</th>
          <th>OUTCOME</th><th>SIGNAL</th><th>SESSION</th><th>SCORE</th>
        </tr>
      </thead>
      <tbody id="lcExpiredBody">
        <tr><td colspan="9" class="lc-empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="lc-overlay" id="lcOverlay">
  <div class="lc-panel">
    <div class="lc-panel-head">
      <div class="lc-panel-title" id="lcPanelTitle">—</div>
      <button class="lc-panel-close" id="lcPanelClose">CLOSE</button>
    </div>
    <div class="lc-panel-meta" id="lcPanelMeta"></div>
    <div class="lc-tf-tabs" id="lcTfTabs"></div>
    <div id="lcTfContent"></div>
  </div>
</div>

<script>
const state = { venue: 'all', open: [], expired: [], expiredFilter: 'ALL', expiredFiltered: [], pairFilter: '', dateFrom: '', dateTo: '' };

function todayEtStr() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
}
function etDateStr(iso) {
  if (!iso) return null;
  try { return new Date(iso).toLocaleDateString('en-CA', { timeZone: 'America/New_York' }); } catch (e) { return null; }
}

function fmtNum(v, d) {
  if (v === null || v === undefined || v === '') return '—';
  const n = Number(v);
  if (Number.isNaN(n)) return String(v);
  return n.toFixed(d === undefined ? 4 : d);
}
function fmtEt(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  } catch (e) { return '—'; }
}
function elapsedStr(s) {
  if (s === null || s === undefined) return '—';
  s = Math.max(0, Math.floor(s));
  const m = Math.floor(s / 60), r = s % 60;
  return m + 'm ' + r + 's';
}

async function loadData() {
  try {
    const params = new URLSearchParams({ venue: state.venue });
    if (state.dateFrom) params.set('date_from', state.dateFrom);
    if (state.dateTo) params.set('date_to', state.dateTo);
    const res = await fetch('/api/lifecycle/alerts?' + params.toString());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    state.open = data.open || [];
    state.expired = data.expired || [];
    renderOpen();
    renderExpired();
    document.getElementById('lcUpdated').textContent = 'UPDATED ' + new Date().toLocaleTimeString('en-US', { hour12: false });
    document.getElementById('lcUpdated').classList.remove('stale');
  } catch (e) {
    document.getElementById('lcUpdated').textContent = 'FETCH FAILED';
    document.getElementById('lcUpdated').classList.add('stale');
  }
}

function renderOpen() {
  const wrap = document.getElementById('lcOpenCards');
  if (!state.open.length) {
    wrap.innerHTML = '<div class="lc-empty">No open trades</div>';
    return;
  }
  wrap.innerHTML = state.open.map((t, i) => {
    const dirClass = (t.direction || '').toUpperCase() === 'LONG' ? 'long' : 'short';
    const pnl = Number(t.unrealized_pnl);
    const pnlClass = Number.isFinite(pnl) ? (pnl >= 0 ? 'pos' : 'neg') : '';
    return `
    <div class="lc-card venue-${t.venue} is-open" data-kind="open" data-idx="${i}">
      <div class="lc-card-head">
        <span class="lc-pair">${t.pair || '—'}</span>
        <span class="lc-dir ${dirClass}">${(t.direction || '—').toUpperCase()}</span>
        <span class="lc-venue-pill ${t.venue}">${t.venue.toUpperCase()}</span>
      </div>
      <div class="lc-row"><span class="lbl">TIER</span><span class="val">${t.tier || '—'}</span></div>
      <div class="lc-row"><span class="lbl">ENTRY</span><span class="val">${fmtNum(t.entry_price)}</span></div>
      <div class="lc-row"><span class="lbl">CURRENT</span><span class="val">${fmtNum(t.current_price)}</span></div>
      <div class="lc-row"><span class="lbl">SL</span><span class="val">${fmtNum(t.sl)}</span></div>
      <div class="lc-row"><span class="lbl">PNL</span><span class="val ${pnlClass}">${fmtNum(t.unrealized_pnl, 2)}</span></div>
      <div class="lc-row"><span class="lbl">R</span><span class="val ${pnlClass}">${fmtNum(t.r, 2)}</span></div>
      <div class="lc-row"><span class="lbl">ELAPSED</span><span class="val">${elapsedStr(t.elapsed_s)}</span></div>
      <div style="margin-top:8px;"><span class="lc-tag">OPEN</span></div>
    </div>`;
  }).join('');
  wrap.querySelectorAll('.lc-card').forEach(el => {
    el.addEventListener('click', () => {
      const t = state.open[Number(el.dataset.idx)];
      openCandlePanel({
        venue: t.venue, pair: t.pair, direction: t.direction,
        signal_ts: t.opened_at, signal_price: t.entry_price,
        pending_duration_seconds: t.pending_duration_seconds ?? null,
        be_confirm_price: t.be_confirm_price ?? null,
        outcome: 'TRADE_OPENED',
        title: t.pair + ' ' + (t.direction || '').toUpperCase() + ' — OPEN',
        depth_bid_pct: t.depth_bid_pct ?? null,
        depth_ask_pct: t.depth_ask_pct ?? null,
        sl_price: t.sl ?? null,
      });
    });
  });
}

function outcomeFilterPred(filter) {
  switch (filter) {
    case 'CONFIRMED':          return a => (a.outcome || '').toUpperCase() === 'CONFIRMED';
    case 'EXPIRED':            return a => (a.outcome || '').toUpperCase().includes('EXPIRED');
    case 'J1H_BLOCKED':        return a => (a.outcome || '').toUpperCase() === 'J1H_DISCARDED';
    case 'PEAK_DECAY':         return a => (a.exit_reason || '').toUpperCase() === 'PEAK_DECAY_20';
    case 'CONFIRM_REVERSAL':   return a => (a.exit_reason || '').toUpperCase() === 'CONFIRM_REVERSAL';
    case 'SIGNAL_EXHAUSTION':  return a => (a.exit_reason || '').toUpperCase() === 'SIGNAL_EXHAUSTION';
    case 'KILL':               return a => { const er = (a.exit_reason || '').toUpperCase(); return er === 'KILL' || er === 'KILLZONE' || er === 'HP_TIME_EXIT' || er === 'SL_PROXIMITY'; };
    default:                   return () => true;
  }
}

function outcomeColor(o) {
  const v = String(o || '').toUpperCase();
  if (v === 'CONFIRMED') return '#22c55e';
  if (v === 'EXPIRED_AGE' || v === 'EXPIRED_J15M' || v === 'EXPIRED_PRICE') return '#f59e0b';
  if (v === 'J1H_DISCARDED') return '#f59e0b';
  if (v === 'PEAK_DECAY_20') return '#a855f7';
  if (v === 'CONFIRM_REVERSAL') return '#ef4444';
  if (v === 'SIGNAL_EXHAUSTION') return '#06b6d4';
  if (v === 'KILL' || v === 'KILLZONE') return '#f97316';
  return '#ffffff';
}
function hexToRgba(hex, alpha) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16), g = parseInt(h.substring(2, 4), 16), b = parseInt(h.substring(4, 6), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}
function outcomeBadge(o) {
  const c = outcomeColor(o);
  const label = o || '—';
  return '<span style="display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700;color:' + c +
    ';background:' + hexToRgba(c, 0.15) + ';border:1px solid ' + hexToRgba(c, 0.4) + '">' + label + '</span>';
}
function exitReasonColor(er) {
  const v = String(er || '').toUpperCase();
  if (v === 'PEAK_DECAY_20') return '#a855f7';
  if (v === 'CONFIRM_REVERSAL') return '#ef4444';
  if (v === 'SIGNAL_EXHAUSTION') return '#06b6d4';
  if (v === 'KILL' || v === 'KILLZONE') return '#f97316';
  if (v === 'HP_TIME_EXIT') return '#f97316';
  if (v === 'SL_PROXIMITY') return '#f97316';
  return '#ffffff';
}
function exitReasonBadge(er) {
  if (!er) return '';
  const c = exitReasonColor(er);
  return ' <span style="display:inline-block;margin-left:4px;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700;color:' + c +
    ';background:' + hexToRgba(c, 0.15) + ';border:1px solid ' + hexToRgba(c, 0.4) + '">' + er + '</span>';
}
function pnlSpan(pnl) {
  if (pnl === null || pnl === undefined) return '';
  const n = Number(pnl);
  const c = n > 0 ? '#22c55e' : (n < 0 ? '#ef4444' : '#ffffff');
  return ' <span style="font-size:13px;font-weight:700;margin-left:8px;color:' + c + '">' + (n > 0 ? '+' : '') + n.toFixed(2) + '</span>';
}

function renderExpired() {
  const body = document.getElementById('lcExpiredBody');
  const outcomePred = outcomeFilterPred(state.expiredFilter);
  const pairQuery = (state.pairFilter || '').toUpperCase().trim();
  const list = state.expired.filter(a => {
    if (!outcomePred(a)) return false;
    if (pairQuery && !String(a.pair || '').toUpperCase().includes(pairQuery)) return false;
    const d = etDateStr(a.created_at);
    if (state.dateFrom && d && d < state.dateFrom) return false;
    if (state.dateTo && d && d > state.dateTo) return false;
    return true;
  });
  state.expiredFiltered = list;
  if (!list.length) {
    body.innerHTML = '<tr><td colspan="9" class="lc-empty">No alerts match this filter</td></tr>';
    return;
  }
  body.innerHTML = list.map((a, i) => {
    const dirClass = (a.direction || '').toUpperCase() === 'LONG' ? 'long' : 'short';
    return `
    <tr data-kind="expired" data-idx="${i}">
      <td>${fmtEt(a.created_at)}</td>
      <td style="color:var(--${a.venue === 'hl' ? 'hl' : (a.venue === 'mexc' ? 'mexc' : 'white')})">${(a.venue || '—').toUpperCase()}</td>
      <td>${a.pair || '—'}</td>
      <td class="lc-dir ${dirClass}">${(a.direction || '—').toUpperCase()}</td>
      <td>${a.tier || '—'}</td>
      <td>${outcomeBadge(a.outcome)}${exitReasonBadge(a.exit_reason)}${pnlSpan(a.pnl_dollars)}</td>
      <td>${fmtNum(a.signal_price)}</td>
      <td>${a.session || '—'}</td>
      <td>${a.score !== null && a.score !== undefined ? a.score : '—'}</td>
    </tr>`;
  }).join('');
  body.querySelectorAll('tr[data-kind="expired"]').forEach(el => {
    el.addEventListener('click', () => {
      const a = state.expiredFiltered[Number(el.dataset.idx)];
      const ts = a.created_at ? Math.floor(new Date(a.created_at).getTime() / 1000) : null;
      openCandlePanel({
        venue: a.venue, pair: a.pair, direction: a.direction,
        signal_ts: ts, signal_price: a.signal_price,
        pending_duration_seconds: a.pending_duration_seconds ?? null,
        be_confirm_price: a.be_confirm_price ?? null,
        outcome: a.outcome,
        title: a.pair + ' ' + (a.direction || '').toUpperCase() + ' — ' + a.outcome,
        depth_bid_pct: a.depth_bid_pct ?? null,
        depth_ask_pct: a.depth_ask_pct ?? null,
        sl_price: a.sl ?? null,
        exit_r: a.r_value ?? null,
      });
    });
  });
}

function fmtEtHM(ms) {
  if (ms === null || ms === undefined) return '—';
  try {
    return new Date(ms).toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', hour12: false });
  } catch (e) { return '—'; }
}

function tabsForPending(_pending) {
  return ['1m', '5m', '15m', '1h'];
}

function computeKDJ(candles) {
  const n = 9;
  let K = 50, D = 50;
  return candles.map((c, i) => {
    const start = Math.max(0, i - n + 1);
    let lowest = Infinity, highest = -Infinity;
    for (let j = start; j <= i; j++) {
      lowest = Math.min(lowest, candles[j].low);
      highest = Math.max(highest, candles[j].high);
    }
    const rsv = highest === lowest ? 50 : (c.close - lowest) / (highest - lowest) * 100;
    K = (2 / 3) * K + (1 / 3) * rsv;
    D = (2 / 3) * D + (1 / 3) * K;
    return 3 * K - 2 * D;
  });
}

function jColorFor(v) {
  if (!Number.isFinite(v)) return '#ffffff';
  return v < 30 ? '#22c55e' : (v > 70 ? '#ef4444' : '#ffffff');
}
function jColorForExpiry(v) {
  if (!Number.isFinite(v)) return '#ffffff';
  if (v < 0) return '#ef4444';
  if (v < 30) return '#22c55e';
  if (v <= 70) return '#ffffff';
  return '#ef4444';
}
function zoneForTime(tMs, preZoneEndMs, postZoneStartMs) {
  if (Number.isFinite(preZoneEndMs) && tMs < preZoneEndMs) return 'pre';
  if (Number.isFinite(postZoneStartMs) && tMs >= postZoneStartMs) return 'post';
  return 'signal';
}
function jFmt(v) { return Number.isFinite(v) ? v.toFixed(1) : '—'; }
function pnlFmt(v) {
  if (v === null || !Number.isFinite(v)) return '—';
  return (v > 0 ? '+' : (v < 0 ? '-' : '')) + '$' + Math.abs(v).toFixed(2);
}
function pnlColorFor(v) {
  if (v === null || !Number.isFinite(v)) return '#ffffff';
  return v > 0 ? '#22c55e' : (v < 0 ? '#ef4444' : '#ffffff');
}

function buildCandleTable(contentEl, candles, ctx, zones) {
  const isLong = (ctx.direction || '').toUpperCase() === 'LONG';
  const signalPrice = Number(ctx.signal_price);
  const signalMs = ctx.signal_ts ? ctx.signal_ts * 1000 : null;
  const beConfirmPrice = (ctx.be_confirm_price === null || ctx.be_confirm_price === undefined)
    ? null : Number(ctx.be_confirm_price);

  const outcomeUp = String(ctx.outcome || '').toUpperCase();
  const isOpenedOutcome = (outcomeUp === 'TRADE_OPENED' || outcomeUp === 'PRICE_GATE_PASSED');
  const isExpiredOutcome = (outcomeUp === 'EXPIRED_AGE' || outcomeUp === 'EXPIRED_J15M' ||
    outcomeUp === 'EXPIRED_PRICE' || outcomeUp === 'J1H_DISCARDED');

  const jValues = computeKDJ(candles);
  const projPnls = candles.map(c => {
    if (!Number.isFinite(signalPrice) || signalPrice === 0) return null;
    const close = Number(c.close);
    return isLong
      ? (close - signalPrice) / signalPrice * 5000 * 5
      : (signalPrice - close) / signalPrice * 5000 * 5;
  });

  let signalIdx = -1;
  if (signalMs !== null) {
    for (let i = 0; i < candles.length; i++) {
      if (candles[i].time_ms <= signalMs) signalIdx = i; else break;
    }
  }

  let beHitIdx = -1;
  if (beConfirmPrice !== null && Number.isFinite(beConfirmPrice)) {
    for (let i = 0; i < candles.length; i++) {
      const close = Number(candles[i].close);
      const hit = isLong ? close >= beConfirmPrice : close <= beConfirmPrice;
      if (hit) { beHitIdx = i; break; }
    }
  }

  let peakIdx = -1, peakVal = -Infinity;
  projPnls.forEach((v, i) => {
    if (v !== null && v > peakVal) { peakVal = v; peakIdx = i; }
  });

  const beHappened = beHitIdx !== -1;

  const preZoneEndMs = zones ? zones.preZoneEndMs : null;
  const postZoneStartMs = zones ? zones.postZoneStartMs : null;

  // ── pre-signal count, signalLastIdx, exitPrice ──────────────────────────────
  let preCandleCount = 0, signalLastIdx = -1, exitPrice = null;
  candles.forEach((c, i) => {
    const z = zoneForTime(c.time_ms, preZoneEndMs, postZoneStartMs);
    if (z === 'pre') preCandleCount++;
    if (z === 'signal') { signalLastIdx = i; exitPrice = Number(c.close); }
  });

  // ── pre-zone peak: max projPnl in pre-signal candles ──────────────────────
  let prePeakIdx = -1, prePeakVal = -Infinity;
  candles.forEach((c, i) => {
    const z = zoneForTime(c.time_ms, preZoneEndMs, postZoneStartMs);
    if (z === 'pre') {
      const v = projPnls[i];
      if (v !== null && v > prePeakVal) { prePeakVal = v; prePeakIdx = i; }
    }
  });

  // ── R-per-candle: requires sl_price in ctx ──────────────────────────────────
  const slPrice = ctx.sl_price != null ? Number(ctx.sl_price) : null;
  let risk1R = null;
  if (slPrice !== null && Number.isFinite(signalPrice) && signalPrice > 0) {
    const r = Math.abs(signalPrice - slPrice) / signalPrice * 25000;
    if (r > 0) risk1R = r;
  }

  const rowsArr = [];

  // ── pre-signal header ───────────────────────────────────────────────────────
  if (zones && preCandleCount > 0) {
    rowsArr.push('<tr><td colspan="8" style="background:#6d28d9;color:#ffffff;font-size:11px;font-weight:700;padding:4px 8px;letter-spacing:0.12em">\u25b2 PRE-SIGNAL (last ' + preCandleCount + ' candles)</td></tr>');
  }

  let prevZone = null;
  candles.forEach((c, i) => {
    const zone = zoneForTime(c.time_ms, preZoneEndMs, postZoneStartMs);

    if (zones && prevZone === 'pre' && zone === 'signal') {
      rowsArr.push('<tr><td colspan="8" style="background:#06b6d4;color:#000000;font-size:12px;font-weight:700;padding:4px 8px;letter-spacing:0.15em">\u25bc SIGNAL FIRED \u2014 ALERT WINDOW BEGINS \u25bc</td></tr>');
    }
    if (zones && prevZone === 'signal' && zone === 'post') {
      rowsArr.push('<tr><td colspan="8" style="background:#1e3a5f;color:#ffffff;font-size:12px;font-weight:700;padding:4px 8px;letter-spacing:0.15em">\u25bc POST-EXIT (next 10 candles)</td></tr>');
    }
    prevZone = zone;

    let note = '', noteColor = '#ffffff', noteBorderColor = 'transparent';

    if (zone === 'pre') {
      // ── pre-zone: COMPRESSED if J extremes ──────────────────────────────────
      const j = jValues[i];
      if (Number.isFinite(j) && (isLong ? j < 20 : j > 80)) {
        note = 'COMPRESSED'; noteColor = '#22c55e'; noteBorderColor = '#22c55e';
      }
      // ── pre-zone peak ────────────────────────────────────────────────────────
      if (i === prePeakIdx) {
        note = 'PRE-PEAK ★'; noteColor = '#f59e0b'; noteBorderColor = '#f59e0b';
      }
    } else if (zone === 'post') {
      // ── post-zone: exit-relative PNL note ───────────────────────────────────
      if (exitPrice !== null && Number.isFinite(exitPrice) && exitPrice > 0) {
        const close = Number(c.close);
        const postPnl = isLong
          ? (close - exitPrice) / exitPrice * 25000
          : (exitPrice - close) / exitPrice * 25000;
        note = (postPnl >= 0 ? '+' : '') + '$' + Math.abs(postPnl).toFixed(2);
        noteColor = postPnl >= 0 ? '#22c55e' : '#ef4444';
      }
    } else {
      // ── signal zone: existing note logic (use signalLastIdx, not lastIdx) ───
      if (i === signalLastIdx) {
        if (ctx.exit_reason && !isExpiredOutcome && !isOpenedOutcome) {
          note = ctx.exit_reason.replace(/_/g, ' ');
          noteColor = '#a855f7';
          noteBorderColor = '#a855f7';
        } else {
          note = beHappened ? 'EXPIRED' : 'BE MISS';
          noteColor = '#ef4444';
          noteBorderColor = '#ef4444';
        }
      } else if (i === signalIdx) {
        note = 'SIGNAL'; noteColor = '#06b6d4'; noteBorderColor = '#06b6d4';
      } else if (i === beHitIdx) {
        note = 'BE HIT'; noteColor = '#22c55e'; noteBorderColor = '#22c55e';
      } else if (i === peakIdx) {
        note = 'PEAK \u2605'; noteColor = '#f59e0b'; noteBorderColor = '#f59e0b';
      }
    }

    let rowBg = '#060610', borderColor = noteBorderColor;
    if (zone === 'pre') { rowBg = '#1a0505'; borderColor = '#ef444444'; }
    else if (zone === 'post') { rowBg = '#05051a'; borderColor = '#06b6d444'; }

    const timeStr = fmtEtHM(c.time_ms);
    const closeStr = Number(c.close).toFixed(6);
    const pnl = projPnls[i];
    const jVal = jValues[i];

    // ── VOL ────────────────────────────────────────────────────────────────────
    const volRaw = c.volume;
    const volStr = (volRaw !== undefined && volRaw !== null && volRaw !== '')
      ? Math.round(Number(volRaw)).toLocaleString() : '\u2014';

    // ── S%/B% (signal row only) ────────────────────────────────────────────────
    let sbStr = '\u2014';
    if (i === signalIdx) {
      const bid = ctx.depth_bid_pct, ask = ctx.depth_ask_pct;
      if (bid != null || ask != null) {
        sbStr = (bid != null ? Number(bid).toFixed(1) + '%' : '\u2014') + '/' + (ask != null ? Number(ask).toFixed(1) + '%' : '\u2014');
      }
    }

    // ── R (signal zone only, requires sl_price) ────────────────────────────────
    let rStr = '\u2014';
    if (zone === 'signal' && risk1R !== null && pnl !== null) {
      rStr = (pnl / risk1R).toFixed(2) + 'R';
    }

    rowsArr.push(`
    <tr style="background:${rowBg};border-left:2px solid ${borderColor}">
      <td style="padding:8px;font-size:14px;font-weight:700;color:#ffffff;text-align:left">${timeStr}</td>
      <td style="padding:8px;font-size:14px;font-weight:700;color:#ffffff;text-align:right">${closeStr}</td>
      <td style="padding:8px;font-size:14px;font-weight:700;color:${pnlColorFor(pnl)};text-align:right">${pnlFmt(pnl)}</td>
      <td style="padding:8px;font-size:14px;font-weight:700;color:${jColorFor(jVal)};text-align:right">${jFmt(jVal)}</td>
      <td style="padding:6px 8px;font-size:12px;font-weight:700;color:#ffffff;text-align:right">${volStr}</td>
      <td style="padding:6px 8px;font-size:11px;font-weight:700;color:#ffffff;text-align:right;white-space:nowrap">${sbStr}</td>
      <td style="padding:6px 8px;font-size:12px;font-weight:700;color:${pnlColorFor(pnl)};text-align:right">${rStr}</td>
      <td style="padding:8px;font-size:12px;font-weight:700;color:${noteColor}">${note}</td>
    </tr>`);
  });
  const rows = rowsArr.join('');

  const peakTimeStr = peakIdx !== -1 ? fmtEtHM(candles[peakIdx].time_ms) : '\u2014';
  const jAtSignal = signalIdx !== -1 ? jValues[signalIdx] : null;
  const jPeak = peakIdx !== -1 ? jValues[peakIdx] : null;
  const jAtExpiry = signalLastIdx !== -1 ? jValues[signalLastIdx] : (jValues.length ? jValues[jValues.length - 1] : null);

  contentEl.innerHTML = `
  <div style="overflow-x:auto">
  <table style="width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace">
  <thead>
  <tr style="border-bottom:2px solid #1e1e3a">
  <th style="padding:8px;font-size:13px;font-weight:700;color:#ffffff;text-align:left">TIME</th>
  <th style="padding:8px;font-size:13px;font-weight:700;color:#ffffff;text-align:right">CLOSE</th>
  <th style="padding:8px;font-size:13px;font-weight:700;color:#ffffff;text-align:right">PROJ PNL</th>
  <th style="padding:8px;font-size:13px;font-weight:700;color:#ffffff;text-align:right">J</th>
  <th style="padding:8px;font-size:13px;font-weight:700;color:#ffffff;text-align:right">VOL</th>
  <th style="padding:8px;font-size:13px;font-weight:700;color:#ffffff;text-align:right">S%/B%</th>
  <th style="padding:8px;font-size:13px;font-weight:700;color:#ffffff;text-align:right">R</th>
  <th style="padding:8px;font-size:13px;font-weight:700;color:#ffffff;text-align:left">NOTE</th>
  </tr>
  </thead>
  <tbody id="candle-tbody">
  ${rows}
  </tbody>
  </table>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;border-top:1px solid #1e1e3a">
    <div>
      <div style="font-size:11px;font-weight:700;color:#ffffff;opacity:0.5;letter-spacing:0.1em">PEAK PNL</div>
      <div style="font-size:16px;font-weight:700;color:#22c55e">${pnlFmt(peakIdx !== -1 ? projPnls[peakIdx] : null)}</div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;color:#ffffff;opacity:0.5;letter-spacing:0.1em">PEAK TIME</div>
      <div style="font-size:16px;font-weight:700;color:#ffffff">${peakTimeStr}</div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;color:#ffffff;opacity:0.5;letter-spacing:0.1em">BE CONFIRM</div>
      <div style="font-size:16px;font-weight:700;color:${beHappened ? '#22c55e' : '#ef4444'}">${beHappened ? 'HIT' : 'MISSED'}</div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;color:#ffffff;opacity:0.5;letter-spacing:0.1em">J AT SIGNAL</div>
      <div style="font-size:16px;font-weight:700;color:${jColorFor(jAtSignal)}">${jFmt(jAtSignal)}</div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;color:#ffffff;opacity:0.5;letter-spacing:0.1em">J PEAK</div>
      <div style="font-size:16px;font-weight:700;color:#ffffff">${jFmt(jPeak)}</div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;color:#ffffff;opacity:0.5;letter-spacing:0.1em">J AT EXPIRY</div>
      <div style="font-size:16px;font-weight:700;color:${jColorForExpiry(jAtExpiry)}">${jFmt(jAtExpiry)}</div>
    </div>
  </div>`;
}

async function renderTfTable(tf) {
  const contentEl = document.getElementById('lcTfContent');
  const ctx = state.panelCtx;
  const pending = (ctx.pending_duration_seconds === null || ctx.pending_duration_seconds === undefined || !Number.isFinite(Number(ctx.pending_duration_seconds)))
    ? 480 : Number(ctx.pending_duration_seconds);
  contentEl.innerHTML = '<div class="lc-chart-empty">Loading…</div>';
  try {
    const url = `/api/lifecycle/candles?venue=${encodeURIComponent(ctx.venue)}&pair=${encodeURIComponent(ctx.pair)}&signal_ts=${ctx.signal_ts}&interval=${tf}&pending=${pending}&pre_bars=15&post_bars=10`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const candles = (data.candles && data.candles[tf]) || [];
    if (!candles.length) {
      contentEl.innerHTML = '<div class="lc-chart-empty">No candle data</div>';
      return;
    }
    const zones = {
      preZoneEndMs: data.pre_zone_end_ms,
      postZoneStartMs: data.post_zone_start_ms,
    };
    buildCandleTable(contentEl, candles, ctx, zones);
  } catch (e) {
    contentEl.innerHTML = '<div class="lc-chart-empty">Failed to load candle data</div>';
  }
}

function openCandlePanel(ctx) {
  const overlay = document.getElementById('lcOverlay');
  const tfTabsEl = document.getElementById('lcTfTabs');
  const contentEl = document.getElementById('lcTfContent');
  document.getElementById('lcPanelTitle').textContent = ctx.title;
  document.getElementById('lcPanelMeta').innerHTML =
    `<span><span class="lbl">VENUE</span>${(ctx.venue || '—').toUpperCase()}</span>
     <span><span class="lbl">SIGNAL PRICE</span>${fmtNum(ctx.signal_price)}</span>`;
  state.panelCtx = ctx;
  overlay.classList.add('open');

  if (!ctx.venue || !ctx.pair || !ctx.signal_ts) {
    tfTabsEl.innerHTML = '';
    contentEl.innerHTML = '<div class="lc-chart-empty">No timestamp available</div>';
    return;
  }

  const pending = (ctx.pending_duration_seconds === null || ctx.pending_duration_seconds === undefined)
    ? null : Number(ctx.pending_duration_seconds);
  const tabs = tabsForPending(pending);

  tfTabsEl.innerHTML = tabs.map((tf, i) =>
    `<button class="lc-tf-tab${i === 0 ? ' active' : ''}" data-tf="${tf}">${tf.toUpperCase()}</button>`
  ).join('');

  renderTfTable(tabs[0]);
}

document.getElementById('lcTfTabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.lc-tf-tab');
  if (!btn) return;
  document.querySelectorAll('.lc-tf-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTfTable(btn.dataset.tf);
});

document.getElementById('lcFilters').addEventListener('click', (e) => {
  const btn = e.target.closest('.lc-fp');
  if (!btn) return;
  document.querySelectorAll('.lc-fp').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.venue = btn.dataset.venue;
  loadData();
});

document.getElementById('lcOutcomeFilters').addEventListener('click', (e) => {
  const btn = e.target.closest('.lc-outpill');
  if (!btn) return;
  document.querySelectorAll('.lc-outpill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.expiredFilter = btn.dataset.filter;
  renderExpired();
});

document.getElementById('lcPairFilter').addEventListener('input', (e) => {
  state.pairFilter = e.target.value;
  renderExpired();
});

const lcDateFromEl = document.getElementById('lc-date-from');
const lcDateToEl = document.getElementById('lc-date-to');

function onLcDateChange() {
  state.dateFrom = lcDateFromEl.value;
  state.dateTo = lcDateToEl.value;
  const today = todayEtStr();
  if (state.dateFrom !== today || state.dateTo !== today) {
    loadData();
  } else {
    renderExpired();
  }
}
lcDateFromEl.addEventListener('change', onLcDateChange);
lcDateToEl.addEventListener('change', onLcDateChange);

(function initLcDateFilters() {
  const t = todayEtStr();
  state.dateFrom = t;
  state.dateTo = t;
  lcDateFromEl.value = t;
  lcDateToEl.value = t;
})();

document.getElementById('lcPanelClose').addEventListener('click', () => {
  document.getElementById('lcOverlay').classList.remove('open');
});
document.getElementById('lcOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'lcOverlay') e.target.classList.remove('open');
});

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
