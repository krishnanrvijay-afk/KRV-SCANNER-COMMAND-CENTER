<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LIFECYCLE — KRV FLEET</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --hl:#a855f7;--mexc:#f97316;--green:#22c55e;--red:#ef4444;
  --amber:#f59e0b;--cyan:#06b6d4;--white:#ffffff;
  --bg:#05050f;--card:#0a0a1a;--border:#1a1a32;
  --D:'Bebas Neue',sans-serif;--M:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--white);font-family:var(--M);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.tb{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid var(--border);background:#07071a;flex-shrink:0}
.back{font-family:var(--D);font-size:13px;border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 12px;color:var(--white);text-decoration:none;letter-spacing:.06em}
.tb-title{font-family:var(--D);font-size:22px;letter-spacing:.1em;color:var(--white)}
.tb-sub{font-size:9px;color:#666688;letter-spacing:.18em}
.vbtns{display:flex;gap:4px}
.vb{font-family:var(--D);font-size:12px;padding:3px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;letter-spacing:.06em}
.vb.all{border-color:rgba(255,255,255,.7);color:var(--white);background:rgba(255,255,255,.08)}
.vb.hl{border-color:var(--hl);color:var(--hl);background:rgba(168,85,247,.12);box-shadow:0 0 10px rgba(168,85,247,.25)}
.vb.mexc{border-color:var(--mexc);color:var(--mexc);background:rgba(249,115,22,.12);box-shadow:0 0 10px rgba(249,115,22,.25)}
.btc{display:flex;align-items:center;gap:7px;padding:4px 13px;border-radius:22px;border:1px solid;transition:all .5s;margin:0 4px}
.btc.bull{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.07);box-shadow:0 0 14px rgba(34,197,94,.1)}
.btc.bear{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.07);box-shadow:0 0 14px rgba(239,68,68,.1)}
.btc.range{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.05)}
.btc-lbl{font-family:var(--D);font-size:17px;letter-spacing:.1em;font-weight:700}
.btc-price{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.btc-chg{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:9px}
.sess-pill{font-family:var(--D);font-size:13px;padding:3px 10px;border-radius:5px;border:1px solid;letter-spacing:.08em;font-weight:700}
.sess-pill.ASIA{color:var(--amber);border-color:rgba(245,158,11,.5)}
.sess-pill.EU{color:var(--cyan);border-color:rgba(6,182,212,.5)}
.sess-pill.US{color:var(--green);border-color:rgba(34,197,94,.5)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.live{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.stale{background:var(--red);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.clk{font-size:12px;color:var(--white);font-variant-numeric:tabular-nums;letter-spacing:.04em;font-weight:700}

/* ── STAT STRIP ── */
.strip{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);flex-shrink:0}
.sc{padding:10px 16px;border-right:1px solid var(--border)}
.sc:last-child{border-right:none}
.sc-lbl{font-size:8px;color:#888899;letter-spacing:.16em;text-transform:uppercase;margin-bottom:3px;font-weight:700}
.sc-val{font-family:var(--D);font-size:30px;letter-spacing:.04em;line-height:1;color:var(--white)}
.sc-sub{font-size:10px;color:var(--white);margin-top:3px;font-weight:700;font-variant-numeric:tabular-nums}
.sc.ppos{background:rgba(34,197,94,.04)}
.sc.pneg{background:rgba(239,68,68,.04)}

/* ── PIPELINE ── */
.pipe{display:flex;align-items:center;padding:5px 12px;border-bottom:1px solid var(--border);background:#06061a;flex-shrink:0;gap:0}
.ps{flex:1;display:flex;align-items:center}
.pn{flex:1;display:flex;align-items:center;justify-content:center}
.pb{display:flex;align-items:center;gap:4px;border:1px solid;border-radius:4px;padding:3px 8px;transition:all .4s}
.pb-lbl{font-family:var(--D);font-size:10px;letter-spacing:.07em}
.pb-n{font-size:10px;font-weight:700;font-variant-numeric:tabular-nums;min-width:14px;text-align:center;color:var(--white)}
.pa{width:16px;height:1px;flex-shrink:0;opacity:.3}

/* ── MAIN GRID ── */
.main{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.col{display:flex;flex-direction:column;overflow:hidden;border-bottom:1px solid var(--border)}
.col:last-child{border-bottom:none}
.col:last-child{border-right:none}
.col-hdr{display:flex;align-items:center;gap:7px;padding:7px 13px;border-bottom:1px solid var(--border);background:#06061a;flex-shrink:0}
.col-hdr-lbl{font-family:var(--D);font-size:14px;letter-spacing:.1em;color:var(--white)}
.col-hdr-badge{font-size:10px;font-weight:700;padding:2px 10px;border-radius:12px;margin-left:auto;color:var(--white)}
.col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.col-body::-webkit-scrollbar{width:2px}
.col-body::-webkit-scrollbar-thumb{background:#1a1a32;border-radius:2px}
.empty{color:#2a2a44;text-align:center;padding:50px 20px;font-size:11px;letter-spacing:.1em}

/* ── GATE PANEL ── */
.gc{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid;transition:all .4s}
.gc.has{border-color:var(--c,#333);background:color-mix(in srgb,var(--c) 8%,transparent)}
.gc.zero{border-color:#0f0f22;background:transparent}
.gc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.gc-name{font-family:var(--D);font-size:15px;letter-spacing:.06em;flex:1;color:var(--white)}
.gc.zero .gc-name{color:#2a2a42}
.gc-bar{flex:2;height:7px;background:#0a0a1e;border-radius:4px;overflow:hidden}
.gc-fill{height:100%;border-radius:4px;transition:width .6s}
.gc-n{font-family:var(--D);font-size:24px;letter-spacing:.02em;width:38px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;color:var(--white)}
.gc.zero .gc-n{color:#1e1e30}

/* Recent blocks */
.rb-div{font-size:8px;color:#555577;letter-spacing:.14em;text-transform:uppercase;padding:5px 0 2px;border-top:1px solid #0f0f22;margin-top:2px}
.rb{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:5px;border:1px solid transparent}
.rb:hover{background:#0a0a1a;border-color:#1a1a2a}
.rb-t{font-size:10px;color:var(--white);font-variant-numeric:tabular-nums;width:32px;flex-shrink:0;font-weight:700}
.rb-vc{font-size:8px;font-weight:700;padding:1px 6px;border-radius:10px;flex-shrink:0;font-family:var(--D);letter-spacing:.06em}
.rb-vc.hl{color:var(--hl);background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.35)}
.rb-vc.mx{color:var(--mexc);background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.35)}
.rb-pair{font-size:12px;font-weight:700;color:var(--white);width:40px;flex-shrink:0}
.rb-dir{font-size:8px;font-weight:700;padding:1px 6px;border-radius:10px;flex-shrink:0}
.rb-dir.L{color:var(--green);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3)}
.rb-dir.S{color:var(--red);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3)}
.rb-gate{flex:1;font-size:9px;font-weight:700;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rb-sess{font-size:8px;font-weight:700;width:18px;text-align:right;flex-shrink:0;color:var(--white)}

/* ── COMPACT TRADE CARD ── */
.tr{border-radius:8px;border:1px solid;padding:10px 13px;transition:all .5s}
.tr.win{border-color:rgba(34,197,94,.45);box-shadow:0 0 20px rgba(34,197,94,.08);background:linear-gradient(130deg,rgba(34,197,94,.05) 0%,var(--card) 55%)}
.tr.loss{border-color:rgba(239,68,68,.4);box-shadow:0 0 20px rgba(239,68,68,.06);background:linear-gradient(130deg,rgba(239,68,68,.04) 0%,var(--card) 55%)}
.tr.flat{border-color:var(--border);background:var(--card)}

/* Row 1: venue + pair + pills + PnL + elapsed + force close */
.tr-r1{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:nowrap}
.tr-pair{font-family:var(--D);font-size:22px;letter-spacing:.05em;color:var(--white);flex-shrink:0}
.tr-pnl{font-family:var(--D);font-size:22px;letter-spacing:.03em;font-variant-numeric:tabular-nums;flex-shrink:0;margin-left:auto}
.tr-r{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}
.tr-elapsed{font-size:10px;font-weight:700;color:var(--white);font-variant-numeric:tabular-nums;flex-shrink:0}

/* Pill badges */
.pill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:12px;border:1px solid;letter-spacing:.05em;font-family:var(--D);flex-shrink:0}
.p-hl{color:var(--hl);border-color:rgba(168,85,247,.55);background:rgba(168,85,247,.12);box-shadow:0 0 7px rgba(168,85,247,.15)}
.p-mx{color:var(--mexc);border-color:rgba(249,115,22,.55);background:rgba(249,115,22,.12);box-shadow:0 0 7px rgba(249,115,22,.15)}
.p-long{color:var(--green);border-color:rgba(34,197,94,.55);background:rgba(34,197,94,.1)}
.p-short{color:var(--red);border-color:rgba(239,68,68,.55);background:rgba(239,68,68,.1)}
.p-ASIA{color:var(--amber);border-color:rgba(245,158,11,.45);background:rgba(245,158,11,.08)}
.p-EU{color:var(--cyan);border-color:rgba(6,182,212,.45);background:rgba(6,182,212,.08)}
.p-US{color:var(--green);border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.08)}

/* Force Close button */
.fc-btn{font-family:var(--D);font-size:11px;letter-spacing:.07em;padding:4px 12px;border-radius:14px;border:1px solid rgba(239,68,68,.6);background:rgba(239,68,68,.1);color:var(--red);cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap}
.fc-btn:hover{background:rgba(239,68,68,.22);border-color:var(--red);box-shadow:0 0 12px rgba(239,68,68,.3);color:var(--white)}
.fc-btn.closing{background:rgba(239,68,68,.3);color:var(--white);cursor:default;border-color:var(--red)}

/* Row 2: prices */
.tr-prices{display:flex;gap:14px;margin-bottom:8px;padding:6px 8px;background:#07071a;border:1px solid #141428;border-radius:6px}
.tp{flex:1}
.tp-lbl{font-size:8px;color:#888899;letter-spacing:.14em;text-transform:uppercase;margin-bottom:2px;font-weight:700}
.tp-val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--white)}

/* Row 3: watchers */
.tr-ww{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.w{border:1px solid;border-radius:6px;padding:5px 8px;transition:all .4s}
.w.armed{border-color:rgba(245,158,11,.6);background:rgba(245,158,11,.08);box-shadow:0 0 10px rgba(245,158,11,.12)}
.w.on{border-color:rgba(6,182,212,.5);background:rgba(6,182,212,.06);box-shadow:0 0 10px rgba(6,182,212,.1)}
.w.off{border-color:#0f0f22;background:transparent}
.w-lbl{font-size:7px;letter-spacing:.1em;font-weight:700;display:flex;align-items:center;gap:3px;margin-bottom:3px;text-transform:uppercase}
.w.armed .w-lbl{color:var(--amber)}
.w.on .w-lbl{color:var(--cyan)}
.w.off .w-lbl{color:#444466}
.w-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.w.armed .w-dot{background:var(--amber);box-shadow:0 0 5px var(--amber)}
.w.on .w-dot{background:var(--cyan);box-shadow:0 0 5px var(--cyan)}
.w.off .w-dot{background:#1a1a30}
.w-val{font-size:11px;font-weight:700;color:var(--white)}
.w.off .w-val{color:#333355}

/* ── FORCE CLOSE MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px)}
.modal{background:#0d0d22;border:1px solid rgba(239,68,68,.5);border-radius:12px;padding:28px 32px;width:320px;box-shadow:0 0 40px rgba(239,68,68,.15)}
.modal-title{font-family:var(--D);font-size:22px;letter-spacing:.08em;color:var(--red);margin-bottom:6px}
.modal-sub{font-size:12px;font-weight:700;color:var(--white);margin-bottom:20px;line-height:1.5}
.modal-btns{display:flex;gap:10px}
.modal-cancel{flex:1;font-family:var(--D);font-size:14px;letter-spacing:.07em;padding:9px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--white);cursor:pointer;transition:all .15s}
.modal-cancel:hover{background:#1a1a32}
.modal-confirm{flex:1;font-family:var(--D);font-size:14px;letter-spacing:.07em;padding:9px;border-radius:8px;border:none;background:rgba(239,68,68,.85);color:var(--white);cursor:pointer;transition:all .15s;font-weight:700}
.modal-confirm:hover{background:var(--red);box-shadow:0 0 16px rgba(239,68,68,.4)}
.modal-confirm:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>

<!-- FORCE CLOSE MODAL -->
<div class="modal-bg" id="fc-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">⚠ FORCE CLOSE</div>
    <div class="modal-sub" id="fc-modal-sub">Close this position?</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">CANCEL</button>
      <button class="modal-confirm" id="fc-confirm-btn" onclick="confirmClose()">CLOSE POSITION</button>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="tb">
  <a href="/" class="back">← FLEET</a>
  <span class="tb-title">LIFECYCLE</span>
  <span class="tb-sub">MONITOR</span>
  <div class="vbtns">
    <button class="vb all" onclick="setV('all',this)">ALL</button>
    <button class="vb" onclick="setV('hl',this)">HL</button>
    <button class="vb" onclick="setV('mexc',this)">MEXC</button>
  </div>
  <div class="btc range" id="btc-pill">
    <span id="btc-ico">◈</span>
    <span class="btc-lbl" id="btc-lbl" style="color:var(--amber)">BTC</span>
    <span class="btc-price" id="btc-p" style="color:var(--white)">—</span>
    <span class="btc-chg" id="btc-c" style="color:var(--white)">—</span>
  </div>
  <div class="tb-r">
    <div class="sess-pill EU" id="sess-b">EU</div>
    <div style="display:flex;align-items:center;gap:5px">
      <div class="dot live" id="dot"></div>
      <span id="pnl-hdr" style="font-family:var(--D);font-size:16px;color:var(--green);font-weight:700">+$0.00</span>
    </div>
    <div class="clk" id="clk">--:--:--</div>
  </div>
</div>

<!-- STAT STRIP -->
<div class="strip">
  <div class="sc" id="sc-pnl">
    <div class="sc-lbl">NET P&L TODAY</div>
    <div class="sc-val" id="ss-pnl" style="color:var(--green)">+$0.00</div>
    <div class="sc-sub" id="ss-pnl-sub">0 closed</div>
  </div>
  <div class="sc">
    <div class="sc-lbl">WIN RATE</div>
    <div class="sc-val" id="ss-wr">0%</div>
    <div class="sc-sub" id="ss-wrsub">0W / 0L</div>
  </div>
  <div class="sc">
    <div class="sc-lbl">GATES BLOCKED TODAY</div>
    <div class="sc-val" id="ss-gates" style="color:var(--amber)">0</div>
    <div class="sc-sub" id="ss-top-gate">—</div>
  </div>
  <div class="sc">
    <div class="sc-lbl">OPEN TRADES</div>
    <div class="sc-val" id="ss-trades" style="color:var(--cyan)">0</div>
    <div style="display:flex;gap:5px;margin-top:3px">
      <span id="hl-tag" style="display:none;font-size:9px;font-weight:700;padding:1px 8px;border-radius:10px;color:var(--hl);background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.35)">HL 0</span>
      <span id="mx-tag" style="display:none;font-size:9px;font-weight:700;padding:1px 8px;border-radius:10px;color:var(--mexc);background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.35)">MEXC 0</span>
    </div>
  </div>
</div>

<!-- PIPELINE -->
<div class="pipe" id="pipe"></div>

<!-- MAIN -->
<div class="main">
  <!-- TOP: Active Trades (compact, auto height) -->
  <div class="col" style="flex:0 0 auto;max-height:38vh">
    <div class="col-hdr">
      <span style="font-size:12px;color:var(--green)">◉</span>
      <span class="col-hdr-lbl">ACTIVE TRADES</span>
      <span class="col-hdr-badge" id="trade-badge" style="background:rgba(34,197,94,.1);color:var(--white);border:1px solid rgba(34,197,94,.3)">0 LIVE</span>
    </div>
    <div class="col-body" id="trade-body"><div class="empty">NO OPEN POSITIONS</div></div>
  </div>

  <!-- BOTTOM: Gate Activity (full width, majority of remaining space) -->
  <div class="col" style="flex:1">
    <div class="col-hdr">
      <span style="font-size:12px;color:var(--amber)">⚡</span>
      <span class="col-hdr-lbl">GATE ACTIVITY</span>
      <span class="col-hdr-badge" id="gate-badge" style="background:rgba(245,158,11,.12);color:var(--white);border:1px solid rgba(245,158,11,.4)">0 blocked</span>
    </div>
    <div class="col-body" id="gate-body"><div class="empty">WAITING FOR DATA…</div></div>
  </div>
</div>

<script>
'use strict';
// ── Gate categories ──────────────────────────────────────
const CATS=[
  {key:'ma',   label:'MA STACK',  rgb:'168,85,247', hex:'#a855f7', test:t=>t.includes('MA_STACK')},
  {key:'j1h',  label:'J1H / J3H', rgb:'249,115,22', hex:'#f97316', test:t=>t.includes('J1H')||t.includes('J3H')||(t.includes('1H')&&!t.includes('J15'))},
  {key:'j15',  label:'J15M / RSI',rgb:'245,158,11', hex:'#f59e0b', test:t=>t.includes('J15')||t.includes('RSI')||t.includes('STOCH')},
  {key:'cool', label:'COOLDOWN',  rgb:'107,114,128',hex:'#6b7280', test:t=>t.includes('COOLDOWN')||t.includes('COOL')||t.includes('KILL')},
  {key:'sess', label:'SESSION',   rgb:'239,68,68',  hex:'#ef4444', test:t=>t.includes('SESSION')||t.includes('HALT')},
  {key:'other',label:'OTHER',     rgb:'129,140,248',hex:'#818cf8', test:()=>true},
];
const STAGES=[
  {id:'SCAN',l:'SCAN',i:'⟳',c:'#4466ff'},{id:'GATE',l:'GATE',i:'⚡',c:'#f59e0b'},
  {id:'SIGNAL',l:'SIG',i:'◎',c:'#f97316'},{id:'ALERT',l:'ALERT',i:'◈',c:'#a855f7'},
  {id:'OPEN',l:'OPEN',i:'▲',c:'#06b6d4'},{id:'MANAGE',l:'MGT',i:'◉',c:'#22c55e'},
  {id:'CLOSE',l:'CLOSE',i:'✓',c:'#6b7280'},
];

// ── State ────────────────────────────────────────────────
let venue='all',_gates=[],_trades=[],_closed=[],_ok=true;
let _fcVenue='',_fcPair='',_fcDir='';

// ── Helpers ──────────────────────────────────────────────
const f2=n=>String(Math.round(n)).padStart(2,'0');
const fmtT=iso=>{const d=new Date(iso);return`${f2(d.getHours())}:${f2(d.getMinutes())}`;};
const fmtD=s=>{s=Math.round(s);return s<60?`${s}s`:`${Math.floor(s/60)}m`;};
const fmtPnl=v=>`${v>=0?'+':''}$${Math.abs(v).toFixed(2)}`;
const pc=v=>v>0?'var(--green)':v<0?'var(--red)':'var(--white)';
const getSess=()=>{const h=new Date().getUTCHours();return h<8?'ASIA':h<16?'EU':'US';};
const fmtPx=(pair,p)=>{if(!p)return'—';if((pair||'').includes('BTC'))return p.toFixed(0);if(p>1000)return p.toFixed(1);if(p>10)return p.toFixed(2);return p.toFixed(4);};
const catOf=gt=>{const t=(gt||'').toUpperCase();for(const c of CATS)if(c.test(t))return c;return CATS[CATS.length-1];};
const elap=oa=>fmtD(Math.max(0,Math.round(Date.now()/1000-oa)));

// ── Venue ────────────────────────────────────────────────
function setV(v,btn){
  venue=v;
  document.querySelectorAll('.vb').forEach(b=>b.className='vb');
  btn.className=`vb ${v==='all'?'all':v==='hl'?'hl':'mexc'}`;
  render();
}

// ── Clock ────────────────────────────────────────────────
function tick(){
  const n=new Date();
  document.getElementById('clk').textContent=`${f2(n.getHours())}:${f2(n.getMinutes())}:${f2(n.getSeconds())}`;
  const s=getSess();
  const sb=document.getElementById('sess-b');
  sb.textContent=s; sb.className=`sess-pill ${s}`;
  document.querySelectorAll('[data-oa]').forEach(el=>el.textContent=elap(+el.dataset.oa));
}
setInterval(tick,1000); tick();

// ── BTC Regime ───────────────────────────────────────────
async function fetchBtc(){
  try{
    const r=await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT',{signal:AbortSignal.timeout(5000)});
    const d=await r.json();
    const px=parseFloat(d.lastPrice),chg=parseFloat(d.priceChangePercent);
    const regime=chg>1.5?'BULL':chg<-1.5?'BEAR':'RANGE';
    const col=regime==='BULL'?'var(--green)':regime==='BEAR'?'var(--red)':'var(--amber)';
    const icon=regime==='BULL'?'▲':regime==='BEAR'?'▼':'◈';
    const pill=document.getElementById('btc-pill');
    pill.className=`btc ${regime.toLowerCase()}`;
    document.getElementById('btc-ico').textContent=icon;
    document.getElementById('btc-lbl').textContent=regime;
    document.getElementById('btc-lbl').style.color=col;
    document.getElementById('btc-p').textContent=`$${px.toLocaleString('en-US',{maximumFractionDigits:0})}`;
    document.getElementById('btc-p').style.color=col;
    document.getElementById('btc-c').textContent=`${chg>=0?'+':''}${chg.toFixed(2)}%`;
    document.getElementById('btc-c').style.color=col;
  }catch(e){}
}
fetchBtc(); setInterval(fetchBtc,30000);

// ── Pipeline ─────────────────────────────────────────────
function renderPipe(counts){
  document.getElementById('pipe').innerHTML=STAGES.map((s,i)=>{
    const n=counts[s.id]||0,lit=n>0;
    const arrow=i<STAGES.length-1?`<div class="pa" style="background:linear-gradient(90deg,${s.c},${STAGES[i+1].c})"></div>`:'';
    return`<div class="ps"><div class="pn"><div class="pb" style="border-color:${lit?s.c:'#10102a'};background:${lit?s.c+'14':'transparent'};color:${lit?s.c:'#222244'}">
      <span style="font-size:11px">${s.i}</span>
      <div><div class="pb-lbl" style="color:${lit?s.c:'#222244'}">${s.l}</div>
      <div class="pb-n" style="color:${lit?'var(--white)':'#1a1a33'}">${lit?n:'—'}</div></div>
    </div></div>${arrow}</div>`;
  }).join('');
}

// ── Gate Panel ───────────────────────────────────────────
function renderGates(rows){
  const filt=rows.filter(r=>venue==='all'||(r.venue||'').toLowerCase()===venue);
  const total=filt.length;
  document.getElementById('gate-badge').textContent=`${total} blocked`;

  const cc={};CATS.forEach(c=>cc[c.key]=0);
  filt.forEach(r=>{cc[catOf(r.gate_type).key]++;});
  const maxN=Math.max(1,...Object.values(cc));

  const typeCounts={};
  filt.forEach(r=>{typeCounts[r.gate_type]=(typeCounts[r.gate_type]||0)+1;});
  const topType=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('ss-top-gate').textContent=topType
    ?`top: ${topType[0].replace(/_BLOCK|_FAIL/g,'')} (${topType[1]})` : '—';
  document.getElementById('ss-gates').textContent=total;

  const recent=[...filt].sort((a,b)=>(b.fired_at||'')>(a.fired_at||'')?1:-1).slice(0,12);

  if(total===0){document.getElementById('gate-body').innerHTML='<div class="empty">NO BLOCKS YET TODAY</div>';return;}

  const bars=CATS.map(c=>{
    const n=cc[c.key]||0,has=n>0;
    const w=Math.round(n/maxN*100);
    return`<div class="gc ${has?'has':'zero'}" style="--c:${c.hex}">
      <div class="gc-dot" style="background:${has?c.hex:'#1a1a30'};${has?`box-shadow:0 0 7px ${c.hex}55`:''}"></div>
      <div class="gc-name" style="color:${has?c.hex:'#2a2a42'}">${c.label}</div>
      <div class="gc-bar"><div class="gc-fill" style="width:${w}%;background:${has?`linear-gradient(90deg,${c.hex},${c.hex}88)`:'transparent'}"></div></div>
      <div class="gc-n" style="color:${has?'var(--white)':'#1a1a30'}">${n||0}</div>
    </div>`;
  }).join('');

  const recentHtml=recent.map(r=>{
    const vc=(r.venue||'').toLowerCase();
    const pair=(r.pair||'').replace('_USDT','');
    const dir=(r.direction||'').toUpperCase();
    const cat=catOf(r.gate_type);
    const sess=(r.session||getSess()).substring(0,2);
    const sc=sess==='AS'?'var(--amber)':sess==='EU'?'var(--cyan)':'var(--green)';
    return`<div class="rb">
      <div class="rb-t">${r.fired_at?fmtT(r.fired_at):'--:--'}</div>
      <div class="rb-vc ${vc==='hl'?'hl':'mx'}">${vc.toUpperCase()}</div>
      <div class="rb-pair">${pair}</div>
      <div class="rb-dir ${dir==='LONG'?'L':'S'}">${dir}</div>
      <div class="rb-gate" style="color:${cat.hex}">${r.gate_type||'—'}</div>
      <div class="rb-sess" style="color:${sc}">${sess}</div>
    </div>`;
  }).join('');

  document.getElementById('gate-body').innerHTML=`${bars}<div class="rb-div">RECENT BLOCKS</div>${recentHtml}`;
}

// ── Active Trades ────────────────────────────────────────
function renderTrades(trades){
  const filt=trades.filter(t=>venue==='all'||(t.venue||'').toLowerCase()===venue);
  const hlN=filt.filter(t=>(t.venue||'').toLowerCase()==='hl').length;
  const mxN=filt.filter(t=>(t.venue||'').toLowerCase()==='mexc').length;
  document.getElementById('trade-badge').textContent=`${filt.length} LIVE`;
  document.getElementById('ss-trades').textContent=filt.length;
  const ht=document.getElementById('hl-tag'),mt=document.getElementById('mx-tag');
  ht.textContent=`HL ${hlN}`; ht.style.display=hlN>0?'':'none';
  mt.textContent=`MEXC ${mxN}`; mt.style.display=mxN>0?'':'none';

  if(filt.length===0){
    document.getElementById('trade-body').innerHTML='<div class="empty">NO OPEN POSITIONS</div>';
    return;
  }

  document.getElementById('trade-body').innerHTML=filt.map(t=>{
    const pnl=t.unrealized_pnl??0;
    const r=t.r??0;
    const vc=(t.venue||'hl').toLowerCase();
    const dir=(t.direction||'LONG').toUpperCase();
    const pair=(t.pair||'').replace('_USDT','').replace('_','');
    const pairRaw=t.pair||'';
    const sess=(t.session||getSess()).toUpperCase();
    const cls=pnl>0.5?'win':pnl<-0.5?'loss':'flat';
    const wallOn=pnl>0;
    const decayOn=pnl>1;
    const beOn=pnl>0;
    return`<div class="tr ${cls}">
  <div class="tr-r1">
    <span class="pill p-${vc}">${vc.toUpperCase()}</span>
    <span class="tr-pair">${pair}</span>
    <span class="pill p-${dir.toLowerCase()}">${dir}</span>
    <span class="pill p-${sess}">${sess}</span>
    <span class="tr-pnl" style="color:${pc(pnl)};${pnl>0?`text-shadow:0 0 20px ${pc(pnl)}44`:''}">${fmtPnl(pnl)}</span>
    <span class="tr-r" style="color:${pc(r)}">${r>=0?'+':''}${r.toFixed(2)}R</span>
    <span class="tr-elapsed" data-oa="${t.opened_at||0}">${t.opened_at?elap(t.opened_at):'—'}</span>
    <button class="fc-btn" onclick="openModal('${vc}','${pairRaw}','${dir}','${pair}')">✕ FORCE CLOSE</button>
  </div>
  <div class="tr-prices">
    <div class="tp"><div class="tp-lbl">ENTRY</div><div class="tp-val" style="color:#aaaacc">${fmtPx(t.pair,t.entry_price)}</div></div>
    <div class="tp"><div class="tp-lbl">CURRENT</div><div class="tp-val" style="color:${pc(pnl)}">${fmtPx(t.pair,t.current_price)}</div></div>
    <div class="tp"><div class="tp-lbl">STOP LOSS</div><div class="tp-val" style="color:var(--red)">${fmtPx(t.pair,t.sl)}</div></div>
  </div>
  <div class="tr-ww">
    <div class="w ${wallOn?'armed':'off'}"><div class="w-lbl"><span class="w-dot"></span>WALL TP</div><div class="w-val">${wallOn?'WATCHING':'WAITING'}</div></div>
    <div class="w ${decayOn?'armed':'off'}"><div class="w-lbl"><span class="w-dot"></span>PEAK DECAY</div><div class="w-val">${decayOn?'ACTIVE':'WAITING'}</div></div>
    <div class="w ${beOn?'on':'off'}"><div class="w-lbl"><span class="w-dot"></span>BREAKEVEN</div><div class="w-val">${beOn?'GUARDING':'WAITING'}</div></div>
  </div>
</div>`;
  }).join('');
}

// ── Stats Strip ──────────────────────────────────────────
function renderStats(){
  let wins=0,losses=0,pnl=0;
  _closed.forEach(a=>{const p=a.pnl_dollars;if(p!=null){if(p>=0)wins++;else losses++;pnl+=p;}});
  const tot=wins+losses;
  const wr=tot>0?Math.round(wins/tot*100):0;

  const spnl=document.getElementById('ss-pnl');
  spnl.textContent=fmtPnl(pnl); spnl.style.color=pc(pnl);
  document.getElementById('sc-pnl').className=`sc ${pnl>0?'ppos':pnl<0?'pneg':''}`;
  document.getElementById('ss-pnl-sub').textContent=`${tot} closed`;
  document.getElementById('ss-wr').textContent=`${wr}%`;
  document.getElementById('ss-wr').style.color=wr>=50?'var(--green)':wr<40?'var(--red)':'var(--amber)';
  document.getElementById('ss-wrsub').textContent=`${wins}W / ${losses}L`;
  document.getElementById('pnl-hdr').textContent=fmtPnl(pnl);
  document.getElementById('pnl-hdr').style.color=pc(pnl);
}

// ── Pipeline counts ──────────────────────────────────────
function pipeCounts(){
  const filt=_gates.filter(r=>venue==='all'||(r.venue||'').toLowerCase()===venue);
  const filtT=_trades.filter(t=>venue==='all'||(t.venue||'').toLowerCase()===venue);
  return{SCAN:1,GATE:filt.length,SIGNAL:_closed.length,ALERT:_closed.length,
    OPEN:Math.max(_closed.length,filtT.length),MANAGE:filtT.length,
    CLOSE:_closed.filter(a=>a.pnl_dollars!=null).length};
}

function render(){
  renderGates(_gates);
  renderTrades(_trades);
  renderStats();
  renderPipe(pipeCounts());
}

// ── Force Close modal ────────────────────────────────────
function openModal(v,pairRaw,dir,displayPair){
  _fcVenue=v; _fcPair=pairRaw; _fcDir=dir;
  document.getElementById('fc-modal-sub').innerHTML=
    `Close <strong style="color:var(--white)">${displayPair} ${dir}</strong> on <strong style="color:${v==='hl'?'var(--hl)':'var(--mexc)'}">${v.toUpperCase()}</strong>?<br>This will queue the position for immediate closure.`;
  document.getElementById('fc-confirm-btn').textContent='CLOSE POSITION';
  document.getElementById('fc-confirm-btn').disabled=false;
  document.getElementById('fc-modal').style.display='flex';
}
function closeModal(){ document.getElementById('fc-modal').style.display='none'; }
async function confirmClose(){
  const btn=document.getElementById('fc-confirm-btn');
  btn.textContent='SENDING…'; btn.disabled=true;
  try{
    const res=await fetch('/api/force_close',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({venue:_fcVenue,pair:_fcPair,direction:_fcDir}),
    });
    if(res.ok){btn.textContent='✓ QUEUED';setTimeout(closeModal,1200);}
    else{btn.textContent='ERROR — RETRY';btn.disabled=false;}
  }catch(e){btn.textContent='ERROR — RETRY';btn.disabled=false;}
}
document.getElementById('fc-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── Poll ─────────────────────────────────────────────────
async function poll(){
  try{
    const[ar,gr]=await Promise.all([
      fetch(`/api/lifecycle/alerts?venue=${venue}`),
      fetch('/api/gate_activity'),
    ]);
    if(!ar.ok||!gr.ok) throw new Error('bad');
    const ad=await ar.json(),gd=await gr.json();
    _gates=Array.isArray(gd)?gd:[];
    _trades=ad.open||[];
    _closed=(ad.expired||[]).filter(a=>(a.outcome||'').toUpperCase()==='TRADE_OPENED');
    render();
    if(!_ok){document.getElementById('dot').className='dot live';_ok=true;}
  }catch(e){document.getElementById('dot').className='dot stale';_ok=false;}
}
renderPipe({SCAN:1,GATE:0,SIGNAL:0,ALERT:0,OPEN:0,MANAGE:0,CLOSE:0});
render(); poll(); setInterval(poll,3000);
</script>
