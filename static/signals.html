<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SIGNALS — KRV FLEET</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --hl:#a855f7;--mexc:#f97316;--green:#22c55e;--red:#ef4444;
  --amber:#f59e0b;--cyan:#06b6d4;--white:#ffffff;
  --bg:#05050f;--card:#09090f;--border:#1a1a2e;
  --D:'Bebas Neue',sans-serif;--M:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--white);font-family:var(--M);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.tb{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid var(--border);background:#07071a;flex-shrink:0}
.back{font-family:var(--D);font-size:13px;border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 12px;color:var(--white);text-decoration:none;letter-spacing:.06em}
.tb-title{font-family:var(--D);font-size:22px;letter-spacing:.1em;color:var(--white)}
.tb-sub{font-size:9px;color:#bbb;letter-spacing:.18em;white-space:nowrap}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:9px}
.sess-pill{font-family:var(--D);font-size:13px;padding:3px 10px;border-radius:5px;border:1px solid;letter-spacing:.08em;font-weight:700}
.sess-pill.ASIA{color:var(--amber);border-color:rgba(245,158,11,.5)}
.sess-pill.EU{color:var(--cyan);border-color:rgba(6,182,212,.5)}
.sess-pill.US{color:var(--green);border-color:rgba(34,197,94,.5)}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 8px var(--green)}50%{opacity:.4;box-shadow:0 0 2px rgba(34,197,94,.3)}}
.clk{font-size:12px;color:var(--white);font-variant-numeric:tabular-nums;letter-spacing:.04em;font-weight:700}
.scan-badge{font-family:var(--D);font-size:12px;padding:2px 10px;border-radius:4px;border:1px solid rgba(34,211,238,.35);color:#22d3ee;letter-spacing:.08em}
.live-pill{font-family:var(--D);font-size:11px;padding:2px 8px;border-radius:4px;letter-spacing:.08em;border:1px solid}
.live-pill.live{color:var(--green);border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.08)}
.live-pill.sim{color:var(--amber);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.05)}
.sig-badge{font-family:var(--D);font-size:13px;padding:3px 12px;border-radius:4px;border:1px solid rgba(34,197,94,.45);background:rgba(34,197,94,.08);color:var(--green);letter-spacing:.08em;animation:sigBadge 1.3s ease-in-out infinite;display:none}
@keyframes sigBadge{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px rgba(34,197,94,.4)}}

/* ── PROGRESS RAIL ── */
.prog-rail{height:2px;background:#111;flex-shrink:0;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--hl),#22d3ee);transition:width .14s linear;box-shadow:0 0 8px rgba(34,211,238,.5)}

/* ── MAIN GRID ── */
.pipe-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;overflow:hidden;min-height:0}

/* ── VENUE COLUMN ── */
.venue-col{background:var(--card);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;border:1px solid}
.venue-col.hl{border-color:rgba(168,85,247,.25);box-shadow:0 0 30px rgba(168,85,247,.06)}
.venue-col.mx{border-color:rgba(249,115,22,.25);box-shadow:0 0 30px rgba(249,115,22,.06)}

/* ── VESSEL HEADER ── */
.vessel-hdr{padding:10px 14px 8px;background:#08080e;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;overflow:hidden}
.vessel-hdr::before{content:'';position:absolute;top:-40px;width:200px;height:80px;border-radius:50%;pointer-events:none;opacity:.15}
.hl .vessel-hdr::before{left:-20px;background:radial-gradient(ellipse,var(--hl),transparent 70%)}
.mx .vessel-hdr::before{right:-20px;background:radial-gradient(ellipse,var(--mexc),transparent 70%)}
.vh-top{display:flex;align-items:center;gap:10px;position:relative}
.ring-wrap{position:relative;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ring-pulse{position:absolute;inset:0;border-radius:50%;border:1.5px solid;animation:ringPulse 1.8s ease-out infinite}
.hl .ring-pulse{border-color:var(--hl)}
.mx .ring-pulse{border-color:var(--mexc)}
.ring-core{width:8px;height:8px;border-radius:50%}
.hl .ring-core{background:var(--hl);box-shadow:0 0 8px 3px var(--hl)}
.mx .ring-core{background:var(--mexc);box-shadow:0 0 8px 3px var(--mexc)}
@keyframes ringPulse{0%{transform:scale(.5);opacity:.9}100%{transform:scale(1.7);opacity:0}}
.vh-id{display:flex;flex-direction:column}
.vh-callsign{font-family:var(--D);font-size:19px;letter-spacing:.12em;line-height:1}
.hl .vh-callsign{color:var(--hl)}
.mx .vh-callsign{color:var(--mexc)}
.vh-fullname{font-size:8px;color:#aaa;letter-spacing:.14em}
.vh-right{margin-left:auto;text-align:right}
.vh-scan{font-family:var(--D);font-size:13px;color:#22d3ee;letter-spacing:.08em}
.vh-pairs{font-size:8px;color:#aaa;letter-spacing:.08em}
.vh-mode{font-size:7px;letter-spacing:.1em;margin-top:1px;font-weight:700}
.vh-mode.live{color:var(--green)}
.vh-mode.sim{color:var(--amber)}

/* ── ECG ── */
.ecg-wrap{margin-top:8px}
.ecg-path{fill:none;stroke-width:1.5;stroke-dasharray:200;stroke-dashoffset:200;animation:ecgDraw 2.4s linear infinite}
.hl .ecg-path{stroke:var(--hl)}
.mx .ecg-path{stroke:var(--mexc)}
@keyframes ecgDraw{0%{stroke-dashoffset:200}50%{stroke-dashoffset:0}100%{stroke-dashoffset:-200}}

/* ── BEAM ── */
.beam-track{position:relative;height:3px;margin-top:6px;border-radius:2px;overflow:visible}
.hl .beam-track{background:linear-gradient(90deg,transparent,rgba(168,85,247,.3),transparent)}
.mx .beam-track{background:linear-gradient(90deg,transparent,rgba(249,115,22,.3),transparent)}
.beam-p{position:absolute;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;animation:beamTravel 2.2s linear infinite}
.hl .beam-p{background:var(--hl);box-shadow:0 0 10px 4px var(--hl)}
.mx .beam-p{background:var(--mexc);box-shadow:0 0 10px 4px var(--mexc)}
.beam-p2{animation-delay:.9s;background:#22d3ee !important;box-shadow:0 0 8px 3px rgba(34,211,238,.8) !important}
@keyframes beamTravel{0%{left:0%;opacity:0}8%{opacity:1}92%{opacity:1}100%{left:100%;opacity:0}}

/* ── PIPELINE BODY ── */
.pipe-body{flex:1;overflow-y:auto;padding:4px 0}
.pipe-body::-webkit-scrollbar{width:2px}
.pipe-body::-webkit-scrollbar-thumb{background:#1a1a2e;border-radius:2px}

/* ── PREFLIGHT STRIP ── */
.preflight{display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid #0e0e1a}
.pf-lbl{font-family:var(--D);font-size:10px;letter-spacing:.12em;color:#bbb;width:86px;flex-shrink:0;font-weight:700}
.pf-gates{display:flex;gap:10px}
.pf-gate{display:flex;align-items:center;gap:4px;font-size:8px;letter-spacing:.08em;color:#ccc}

/* ── STAGE ROW ── */
.stage-row{display:flex;align-items:center;gap:6px;padding:5px 10px;border-left:2px solid transparent;transition:all .3s;margin-left:2px}
.stage-row.active-row{border-left-color:inherit;background:rgba(255,255,255,.02)}
.stage-lbl{width:84px;flex-shrink:0}
.stage-name{font-family:var(--D);font-size:10px;letter-spacing:.1em;line-height:1;transition:color .3s;font-weight:700}
.stage-sub{font-size:7px;color:#888;letter-spacing:.06em;margin-top:2px}
.dot-row{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.dot{width:9px;height:9px;border-radius:50%;background:#1a1a1a;border:1px solid #333;transition:background .25s,box-shadow .25s;flex-shrink:0}
.dot.pass{background:var(--green);border:none;box-shadow:0 0 6px 2px rgba(34,197,94,.7)}
.dot.fail{background:var(--red);border:none;box-shadow:0 0 6px 2px rgba(239,68,68,.7)}
.dot.checkpoint{background:#22d3ee;border:none;box-shadow:0 0 6px 2px rgba(34,211,238,.6)}
.stage-stats{font-size:8px;font-weight:700;font-family:var(--D);letter-spacing:.05em;min-width:32px;text-align:right;flex-shrink:0;color:#fff}
.stat-pass{color:var(--green)}
.stat-fail{color:var(--red)}

/* ── CONNECTOR ── */
.connector{margin-left:14px;width:1px;height:5px;background:#1a1a2e}

/* ── DIR GATES HEADER ── */
.dir-hdr{padding:3px 12px;display:flex;align-items:center;gap:8px}
.dir-hdr-lbl{font-family:var(--D);font-size:10px;color:#ccc;letter-spacing:.1em;font-weight:700}
.dir-gate-cols{font-family:var(--D);font-size:8px;color:#999;letter-spacing:.04em;margin-left:auto}

/* ── PAIR DIR CARDS ── */
.pair-cards{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:0 8px 6px}
.pair-card{background:#07070e;border:1px solid #1e1e30;border-radius:5px;padding:5px 6px;transition:all .3s}
.pair-card.has-signal{border-color:rgba(34,211,238,.35);box-shadow:0 0 12px rgba(34,211,238,.12)}
.pc-top{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.pc-name{font-family:var(--D);font-size:11px;letter-spacing:.1em;line-height:1;font-weight:700}
.hl .pc-name{color:var(--hl)}
.mx .pc-name{color:var(--mexc)}
.sig-tag{font-size:7px;padding:1px 4px;border-radius:8px;font-family:var(--D);letter-spacing:.07em;animation:sigBadge 1.2s ease-in-out infinite}
.sig-s{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:var(--red)}
.sig-l{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.4);color:var(--green)}
.dir-grid{display:flex;gap:3px}
.dir-col{display:flex;flex-direction:column;gap:2px;align-items:center}
.sdot{width:7px;height:7px;border-radius:50%;background:#141420;border:1px solid #2a2a40;transition:background .25s,box-shadow .25s;flex-shrink:0}
.sdot.pass{background:var(--green);border:none;box-shadow:0 0 5px 1px rgba(34,197,94,.65)}
.sdot.fail{background:var(--red);border:none;box-shadow:0 0 5px 1px rgba(239,68,68,.65)}
.pc-status{font-size:7px;margin-top:3px;letter-spacing:.04em;line-height:1.3;color:#ccc}

/* ── GATE LEGEND ── */
.gate-legend{padding:3px 12px 4px;font-size:7px;color:#999;letter-spacing:.06em;display:flex;gap:6px;flex-wrap:wrap}
.gl-item{white-space:nowrap;color:#aaa;font-weight:600}

/* ── SIGNAL NODE ── */
.signal-node{margin:3px 10px 2px;padding:7px 12px;border-radius:5px;display:flex;align-items:center;gap:10px;border:1px solid #1e1e30;transition:all .4s}
.signal-node.fired{background:rgba(34,211,238,.06);border-color:rgba(34,211,238,.35);box-shadow:0 0 16px rgba(34,211,238,.15);animation:signalNode 1.5s ease-in-out infinite}
@keyframes signalNode{0%,100%{box-shadow:0 0 10px rgba(34,211,238,.1)}50%{box-shadow:0 0 22px rgba(34,211,238,.3)}}
.sn-icon{font-size:20px;color:#444;transition:color .4s;line-height:1}
.signal-node.fired .sn-icon{color:#22d3ee}
.sn-body{flex:1}
.sn-title{font-family:var(--D);font-size:14px;letter-spacing:.1em;color:#bbb;transition:color .4s;line-height:1;font-weight:700}
.signal-node.fired .sn-title{color:#22d3ee}
.sn-sub{font-size:8px;color:#aaa;letter-spacing:.08em;margin-top:2px}
.sn-fl{font-family:var(--D);font-size:11px;color:#22d3ee;letter-spacing:.08em;opacity:0;transition:opacity .4s}
.signal-node.fired .sn-fl{opacity:1}

/* ── FOOTER ── */
.footer{padding:7px 14px;border-top:1px solid var(--border);background:#07071a;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ft-lbl{font-family:var(--D);font-size:9px;color:#bbb;letter-spacing:.12em;font-weight:700}
.ft-track{position:relative;flex:1;height:2px;background:linear-gradient(90deg,rgba(168,85,247,.3),rgba(34,211,238,.3),rgba(249,115,22,.3));border-radius:1px}
.ft-beam{position:absolute;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:#22d3ee;box-shadow:0 0 8px rgba(34,211,238,.8);animation:beamTravel 1.8s linear infinite}
.ft-dest{font-family:var(--D);font-size:12px;letter-spacing:.1em;padding:3px 12px;border-radius:4px;border:1px solid rgba(34,211,238,.3);color:#22d3ee;background:rgba(34,211,238,.06)}
.ft-mode{font-size:8px;color:#888;margin-left:auto;letter-spacing:.08em}
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="tb">
  <a class="back" href="/">← FLEET</a>
  <div class="tb-title">SIGNALS</div>
  <div class="tb-sub" id="tb-sub">SCAN PIPELINE</div>
  <div class="tb-r">
    <div class="live-pill sim" id="live-pill">SIM</div>
    <div class="scan-badge" id="scan-badge">SCAN #—</div>
    <div class="sig-badge" id="sig-badge">— SIGNALS</div>
    <div class="sess-pill" id="sess-pill">EU</div>
    <div class="dot-live"></div>
    <div class="clk" id="clk">—</div>
  </div>
</div>

<!-- ── SCAN PROGRESS ── -->
<div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

<!-- ── TWO-COLUMN PIPELINE ── -->
<div class="pipe-grid">
  <div class="venue-col hl" id="col-hl"></div>
  <div class="venue-col mx" id="col-mx"></div>
</div>

<!-- ── FOOTER ── -->
<div class="footer">
  <div class="ft-lbl">PROMOTED SIGNALS →</div>
  <div class="ft-track"><div class="ft-beam"></div></div>
  <div class="ft-dest">FLEET LINK + ACTIVE TRADES</div>
  <div class="ft-mode" id="ft-mode">SIMULATED</div>
</div>

<script>
'use strict';

/* ── Static data ────────────────────────────────────────────────── */
const HL_PAIRS   = ['BTC','DOGE','SUI','ETH','NEAR','XRP','SOL','WIF','AVAX','@107','LTC'];
const MEXC_PAIRS = ['BTC','LINK','SOL','ETH','XRP','DOGE','SUI','NEAR','AVAX','ARB','WIF','HYPE','LTC'];

const PAIR_STAGES = [
  {id:'price',  label:'PRICE FETCH',  sub:'1m · book · price',     tickAt:2,  failRate:.04},
  {id:'indic',  label:'INDICATORS',   sub:'KDJ · RSI · ATR · ADX', tickAt:5,  failRate:0},
  {id:'regime', label:'BTC REGIME',   sub:'J1H context gate',       tickAt:8,  failRate:.12},
  {id:'flash',  label:'BTC FLASH',    sub:'1m crash detector',      tickAt:10, failRate:.07},
  {id:'pstate', label:'PAIR STATE',   sub:'→ overlay (free)',       tickAt:12, failRate:0, cp:true},
];

const DIR_GATES = [
  {id:'adx',   label:'ADX', tickAt:13},
  {id:'j1h',   label:'J1H', tickAt:14},
  {id:'rsi',   label:'RSI', tickAt:15},
  {id:'depth', label:'DPT', tickAt:16},
  {id:'sess',  label:'SES', tickAt:17},
  {id:'cool',  label:'COL', tickAt:18},
  {id:'intrd', label:'ITR', tickAt:19},
  {id:'mkt',   label:'MKT', tickAt:20},
  {id:'score', label:'SCR', tickAt:21},
  {id:'drift', label:'DRF', tickAt:22},
];

const DIR_GATES_SIM = DIR_GATES.map((g,i) => ({...g,
  sfr:[.05,.10,.12,.15,.08,.20,.05,.08,.30,.05][i],
  lfr:[.08,.10,.08,.18,.10,.15,.05,.06,.35,.05][i]
}));

const MAX_TICK = 32;

/* ── Live state ─────────────────────────────────────────────────── */
let liveData  = null;
let liveMode  = false;
let liveHlScan = 0, liveMxScan = 0;

/* ── Seeded RNG ──────────────────────────────────────────────────── */
function lcg(seed) {
  let s = seed >>> 0;
  return () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
}
function makeSeed(scan, pi, tag) {
  const h = tag.split('').reduce((a,c) => a*31+c.charCodeAt(0)|0, 0);
  return ((scan*997 + pi*31 + h) >>> 0);
}

/* ── Live helpers ────────────────────────────────────────────────── */
function normSym(s) {
  return s.replace(/_USDT$/i,'').replace(/^@/,'').toUpperCase();
}

function matchPairState(venueKey, pairName) {
  if (!liveData) return null;
  const st = liveData[venueKey];
  if (!st || !Array.isArray(st.pair_states)) return null;
  const target = normSym(pairName);
  return st.pair_states.find(p => normSym(p.symbol || p.pair || '') === target) || null;
}

function computeRealGates(ps, dir, venue) {
  const adx  = parseFloat(ps.adx1h  || ps.adx   || 0);
  const j1h  = parseFloat(ps.j1h    || ps.j_1h   || 0);
  const j15  = parseFloat(ps.j15m   || ps.j_15m  || 0);
  const rsi  = parseFloat(ps.rsi15m || ps.rsi    || 0);
  const bidP = parseFloat(ps.bid_pct || 0);
  const askP = parseFloat(ps.ask_pct || 0);
  const sc   = parseFloat(ps.score  || 0);
  const isS  = dir === 'SHORT';
  const isMx = venue === 'mexc';

  /* MEXC thresholds (config.py):
     ADX_MIN_SHORT=0  ADX_MIN_LONG=20
     J1H_SHORT_MIN=30 J1H_SHORT_MAX=85  J1H_LONG_MAX=59
     RSI15M_SHORT_MIN=35  (no RSI gate for LONG)
     DEPTH_GATE_PCT=55 */
  if (isMx) {
    return {
      adx:   isS ? true              : (adx >= 20),       // no ADX gate for MEXC SHORT
      j1h:   isS ? (j1h > 30 && j1h < 85) : (j1h < 59),
      rsi:   isS ? (rsi > 35)        : true,              // no RSI gate for MEXC LONG
      depth: isS ? (askP >= 55)      : (bidP >= 55),
      sess:  true, cool: true, intrd: true, mkt: true,
      score: sc >= 4,
      drift: true,
    };
  }

  /* HL thresholds (memory: ADX SHORT≥25, LONG≥30; depth 55%/65%) */
  return {
    adx:   isS ? (adx >= 25)          : (adx >= 30),
    j1h:   isS ? (j1h < 60)           : (j1h > 40),
    rsi:   isS ? (rsi > 45)           : (rsi < 55),
    depth: isS ? (askP >= 55)         : (bidP >= 55),
    sess:  true, cool: true, intrd: true, mkt: true,
    score: sc >= 4,
    drift: true,
  };
}

function getRealScanCount(venueKey) {
  if (!liveData) return null;
  const st = liveData[venueKey];
  return (st && st.scan_count) ? st.scan_count : null;
}

function getRealOpenTrades(venueKey) {
  if (!liveData) return [];
  const st = liveData[venueKey];
  if (!st || !st.open_trades) return [];
  const ot = st.open_trades;
  return Array.isArray(ot) ? ot : Object.values(ot);
}

function isBtcFlash(venueKey) {
  if (!liveData) return false;
  const st = liveData[venueKey];
  return !!(st && st.btc_flash_active);
}

/* ── Compute pair states ─────────────────────────────────────────── */
function computeStates(scanNum, pairs, tick, venueKey) {
  const flash = isBtcFlash(venueKey);
  return pairs.map((pairName, pi) => {
    const livePs = liveMode ? matchPairState(venueKey, pairName) : null;
    const pr = {}; let blocked = false;

    for (const st of PAIR_STAGES) {
      if (tick < st.tickAt) { pr[st.id]='idle'; continue; }
      if (st.cp) { pr[st.id]=blocked?'idle':'checkpoint'; continue; }
      if (blocked) { pr[st.id]='idle'; continue; }

      if (livePs) {
        if (st.id === 'flash' && flash) {
          pr[st.id]='fail'; blocked=true;
        } else {
          pr[st.id]='pass';
        }
      } else {
        const failed = lcg(makeSeed(scanNum, pi, st.id))() < st.failRate;
        pr[st.id] = failed ? 'fail' : 'pass';
        if (failed) blocked=true;
      }
    }

    const db = {SHORT:blocked, LONG:blocked};
    const dr = {SHORT:{}, LONG:{}};
    const realG = livePs ? {
      SHORT: computeRealGates(livePs, 'SHORT', venueKey),
      LONG:  computeRealGates(livePs, 'LONG',  venueKey),
    } : null;

    for (const dir of ['SHORT','LONG']) {
      for (const g of DIR_GATES_SIM) {
        if (tick < g.tickAt) { dr[dir][g.id]='idle'; continue; }
        if (db[dir])          { dr[dir][g.id]='idle'; continue; }

        let pass;
        if (realG) {
          pass = !!realG[dir][g.id];
        } else {
          const fr = dir==='SHORT' ? g.sfr : g.lfr;
          pass = lcg(makeSeed(scanNum, pi, g.id+dir))() >= fr;
        }
        dr[dir][g.id] = pass ? 'pass' : 'fail';
        if (!pass) db[dir]=true;
      }
    }

    const ss = !db.SHORT && tick >= MAX_TICK-6;
    const ls = !db.LONG  && tick >= MAX_TICK-6;
    return {pr, dr, ss, ls, livePs};
  });
}

/* ── Active stage ────────────────────────────────────────────────── */
function activeStage(tick) {
  for (let i=PAIR_STAGES.length-1; i>=0; i--)
    if (tick >= PAIR_STAGES[i].tickAt) return PAIR_STAGES[i].id;
  if (tick >= 1) return 'preflight';
  return '';
}

/* ── Build DOM ───────────────────────────────────────────────────── */
function buildColumn(col, venue, pairs, venueKey) {
  const isHL = venueKey === 'hl';
  const clr  = isHL ? '#a855f7' : '#f97316';
  const callsign = isHL ? 'HL-1' : 'MEXC-1';
  const fullname = isHL ? 'HYPERLIQUID' : 'MEXC FUTURES';

  col.innerHTML = `
    <div class="vessel-hdr">
      <div class="vh-top">
        <div class="ring-wrap"><div class="ring-pulse"></div><div class="ring-core"></div></div>
        <div class="vh-id">
          <div class="vh-callsign">${callsign}</div>
          <div class="vh-fullname">${fullname}</div>
        </div>
        <div class="vh-right">
          <div class="vh-scan" id="${venue}-scan-lbl">SCAN #—</div>
          <div class="vh-pairs">${pairs.length} PAIRS</div>
          <div class="vh-mode sim" id="${venue}-mode-lbl">SIM</div>
        </div>
      </div>
      <div class="ecg-wrap">
        <svg viewBox="0 0 200 24" preserveAspectRatio="none" style="width:100%;height:22px">
          <path class="ecg-path" d="M0,12 L35,12 L43,4 L51,20 L59,12 L75,12 L83,2 L91,22 L99,12 L130,12 L138,6 L146,18 L154,12 L200,12"/>
        </svg>
      </div>
      <div class="beam-track"><div class="beam-p"></div><div class="beam-p beam-p2"></div></div>
    </div>

    <div class="pipe-body">
      <div class="preflight" id="${venue}-preflight">
        <div class="pf-lbl">PRE-FLIGHT</div>
        <div class="pf-gates">
          <div class="pf-gate"><div class="dot" id="${venue}-warm"></div><span id="${venue}-warm-lbl">WARMUP</span></div>
          <div class="pf-gate"><div class="dot" id="${venue}-halt"></div><span id="${venue}-halt-lbl">FLEET HALT</span></div>
        </div>
      </div>

      ${PAIR_STAGES.map(st => `
        <div class="stage-row" id="${venue}-row-${st.id}" style="border-left-color:${st.cp?'#22d3ee':clr}">
          <div class="stage-lbl">
            <div class="stage-name" id="${venue}-sname-${st.id}" style="color:#888">${st.label}</div>
            <div class="stage-sub">${st.sub}</div>
          </div>
          <div class="dot-row" id="${venue}-dots-${st.id}">
            ${pairs.map((_,i)=>`<div class="dot" id="${venue}-d-${st.id}-${i}"></div>`).join('')}
          </div>
          <div class="stage-stats" id="${venue}-stats-${st.id}"></div>
        </div>
      `).join('<div class="connector"></div>')}

      <div class="connector"></div>

      <div class="dir-hdr">
        <div class="dir-hdr-lbl">DIRECTION GATES</div>
        <div class="dir-gate-cols">${DIR_GATES.map(g=>g.label).join('·')}</div>
      </div>

      <div class="pair-cards" id="${venue}-pair-cards">
        ${pairs.map((p,i) => `
          <div class="pair-card" id="${venue}-pc-${i}">
            <div class="pc-top">
              <div class="pc-name">${p}</div>
              <div class="sig-tag sig-s" id="${venue}-ss-${i}" style="display:none">SHORT</div>
              <div class="sig-tag sig-l" id="${venue}-sl-${i}" style="display:none">LONG</div>
            </div>
            <div class="dir-grid">
              ${DIR_GATES.map(g=>`
                <div class="dir-col">
                  <div class="sdot" id="${venue}-s-${i}-${g.id}"></div>
                  <div class="sdot" id="${venue}-l-${i}-${g.id}"></div>
                </div>
              `).join('')}
            </div>
            <div class="pc-status" id="${venue}-pcs-${i}"></div>
          </div>
        `).join('')}
      </div>

      <div class="gate-legend">
        <span class="gl-item">ADX=trend strength</span>
        <span class="gl-item">J1H=1h momentum</span>
        <span class="gl-item">RSI=45-55 zone</span>
        <span class="gl-item">DPT=book depth>55%</span>
        <span class="gl-item">SCR≥4</span>
        <span style="color:#777">·</span>
        <span style="color:#999">top=SHORT bot=LONG</span>
      </div>

      <div class="signal-node" id="${venue}-sig-node">
        <div class="sn-icon">◎</div>
        <div class="sn-body">
          <div class="sn-title" id="${venue}-sig-title">EVALUATING…</div>
          <div class="sn-sub" id="${venue}-sig-sub"></div>
        </div>
        <div class="sn-fl">→ FLEET LINK</div>
      </div>
    </div>
  `;
}

/* ── Render ──────────────────────────────────────────────────────── */
function render(tick, scanNum) {
  document.getElementById('prog-fill').style.width = Math.round(tick/MAX_TICK*100)+'%';

  let totalSigs = 0;

  for (const [venue, pairs, venueKey] of [['HL',HL_PAIRS,'hl'],['MEXC',MEXC_PAIRS,'mexc']]) {
    const states = computeStates(scanNum, pairs, tick, venueKey);
    const act    = activeStage(tick);

    const realScan = getRealScanCount(venueKey);
    const displayScan = realScan || scanNum;
    const scanLbl = document.getElementById(venue+'-scan-lbl');
    if (scanLbl) scanLbl.textContent = 'SCAN #'+displayScan;

    const modeLbl = document.getElementById(venue+'-mode-lbl');
    if (modeLbl) {
      modeLbl.textContent = liveMode ? 'LIVE' : 'SIM';
      modeLbl.className = 'vh-mode '+(liveMode?'live':'sim');
    }

    /* Preflight */
    const wDot = document.getElementById(venue+'-warm');
    const hDot = document.getElementById(venue+'-halt');
    if (wDot && tick>=1) wDot.className='dot pass';
    if (hDot && tick>=2) hDot.className='dot pass';

    /* Pipeline stages */
    for (const st of PAIR_STAGES) {
      const rowEl   = document.getElementById(venue+'-row-'+st.id);
      const nameEl  = document.getElementById(venue+'-sname-'+st.id);
      const statsEl = document.getElementById(venue+'-stats-'+st.id);
      if (rowEl) rowEl.classList.toggle('active-row', act===st.id);
      if (nameEl) nameEl.style.color = tick>=st.tickAt ? (st.cp?'#22d3ee':'#fff') : '#888';

      let pass=0, fail=0;
      pairs.forEach((_,pi) => {
        const dotEl = document.getElementById(venue+'-d-'+st.id+'-'+pi);
        if (!dotEl) return;
        const s = states[pi].pr[st.id];
        dotEl.className='dot'+(s==='pass'?' pass':s==='fail'?' fail':s==='checkpoint'?' checkpoint':'');
        if (s==='pass'||s==='checkpoint') pass++;
        if (s==='fail') fail++;
      });

      if (statsEl && tick>=st.tickAt) {
        statsEl.innerHTML =
          (pass?`<span class="stat-pass">${pass}✓</span>`:'') +
          (fail?` <span class="stat-fail">${fail}✗</span>`:'');
      } else if (statsEl) {
        statsEl.innerHTML='';
      }
    }

    /* Direction gate cards */
    let venueSigs=0;
    pairs.forEach((_,pi) => {
      const {dr, ss, ls, livePs} = states[pi];
      const card   = document.getElementById(venue+'-pc-'+pi);
      const ssTag  = document.getElementById(venue+'-ss-'+pi);
      const slTag  = document.getElementById(venue+'-sl-'+pi);
      const statEl = document.getElementById(venue+'-pcs-'+pi);

      if (ssTag) ssTag.style.display = ss?'':'none';
      if (slTag) slTag.style.display = ls?'':'none';
      if (card)  card.classList.toggle('has-signal', ss||ls);
      if (ss||ls) venueSigs++;

      DIR_GATES.forEach(g => {
        const sDot = document.getElementById(venue+'-s-'+pi+'-'+g.id);
        const lDot = document.getElementById(venue+'-l-'+pi+'-'+g.id);
        const sv = dr.SHORT[g.id];
        const lv = dr.LONG[g.id];
        if (sDot) sDot.className='sdot'+(sv==='pass'?' pass':sv==='fail'?' fail':'');
        if (lDot) lDot.className='sdot'+(lv==='pass'?' pass':lv==='fail'?' fail':'');
      });

      if (statEl && tick>=13) {
        const sf = DIR_GATES.find(g=>dr.SHORT[g.id]==='fail');
        const lf = DIR_GATES.find(g=>dr.LONG[g.id]==='fail');
        const sIdle = Object.values(dr.SHORT).every(v=>v==='idle');
        const lIdle = Object.values(dr.LONG).every(v=>v==='idle');
        if (!sIdle||!lIdle) {
          statEl.innerHTML =
            (!sIdle?(sf?`<span style="color:var(--red)">S⊘${sf.label}</span>`:`<span style="color:var(--green)">S✓</span>`):'') +
            ' '+
            (!lIdle?(lf?`<span style="color:#ef444488">L⊘${lf.label}</span>`:`<span style="color:var(--green)">L✓</span>`):'');
          if (livePs) {
            const adx=parseFloat(livePs.adx1h||0), j15=parseFloat(livePs.j15m||0),
                  bidP=parseFloat(livePs.bid_pct||0);
            statEl.innerHTML += `<br><span style="color:#888">ADX ${adx.toFixed(0)} J ${j15.toFixed(0)} B${bidP.toFixed(0)}%</span>`;
          }
        }
      } else if (statEl) {
        statEl.innerHTML='';
      }
    });
    totalSigs += venueSigs;

    /* Signal node */
    const sigNode  = document.getElementById(venue+'-sig-node');
    const sigTitle = document.getElementById(venue+'-sig-title');
    const sigSub   = document.getElementById(venue+'-sig-sub');
    if (!sigNode) continue;

    /* In live mode, also count real open trades as signals */
    let liveOpen = [];
    if (liveMode) {
      liveOpen = getRealOpenTrades(venueKey);
    }

    if (tick >= MAX_TICK-6 || liveOpen.length) {
      const sSigs = states.filter(p=>p.ss).length;
      const lSigs = states.filter(p=>p.ls).length;
      const tot   = sSigs + lSigs;
      const liveTot = liveOpen.length;
      if (tot > 0 || liveTot > 0) {
        sigNode.className='signal-node fired';
        if (sigTitle) sigTitle.textContent = liveMode && liveTot ? 'TRADE ACTIVE' : 'SIGNAL FIRED';
        if (sigSub) {
          let parts=[];
          if (liveMode && liveTot) {
            liveOpen.forEach(t=>{
              const sym=(t.symbol||t.pair||'').replace(/_USDT$/i,'');
              const dir=(t.direction||'').toUpperCase();
              parts.push(`<span style="color:${dir==='LONG'?'var(--green)':'var(--red)'}">${sym} ${dir}</span>`);
            });
          } else {
            if (sSigs) parts.push(`<span style="color:var(--red)">${sSigs}×SHORT</span>`);
            if (lSigs) parts.push(`<span style="color:var(--green)">${lSigs}×LONG</span>`);
          }
          sigSub.innerHTML = parts.join(' ');
        }
      } else {
        sigNode.className='signal-node';
        if (sigTitle) sigTitle.textContent='NO SIGNAL';
        if (sigSub)  sigSub.innerHTML='';
      }
    } else {
      sigNode.className='signal-node';
      if (sigTitle) sigTitle.textContent='EVALUATING…';
      if (sigSub)  sigSub.innerHTML='';
    }
  }

  /* Topbar signal badge */
  const sb = document.getElementById('sig-badge');
  if (sb) {
    if (totalSigs>0 && tick>=MAX_TICK-6) {
      sb.style.display='';
      sb.textContent=totalSigs+' SIGNAL'+(totalSigs!==1?'S':'');
    } else {
      sb.style.display='none';
    }
  }

  /* Topbar scan badge */
  const topScan = getRealScanCount('hl') || getRealScanCount('mexc') || scanNum;
  document.getElementById('scan-badge').textContent='SCAN #'+topScan;
}

/* ── Clock ───────────────────────────────────────────────────────── */
function updateClock() {
  const now = new Date();
  document.getElementById('clk').textContent =
    now.toUTCString().slice(17,22)+' UTC';
  const h = now.getUTCHours();
  const sess = h<8?'ASIA':h<17?'EU':'US';
  const pill = document.getElementById('sess-pill');
  pill.textContent=sess; pill.className='sess-pill '+sess;
  document.getElementById('tb-sub').textContent='SCAN PIPELINE · '+sess+' SESSION';
}

/* ── Fetch live data from fleet scorecard API ────────────────────── */
async function fetchLive() {
  try {
    const r = await fetch('/api/live', {credentials:'include'});
    if (!r.ok) { setSimMode(); return; }
    const data = await r.json();
    liveData = data;
    const hlOk   = !!data.hl_ok;
    const mxOk   = !!data.mexc_ok;
    liveMode = hlOk || mxOk;
    const pill = document.getElementById('live-pill');
    const ftMode = document.getElementById('ft-mode');
    if (liveMode) {
      pill.textContent='LIVE'; pill.className='live-pill live';
      if (ftMode) ftMode.textContent='LIVE DATA FROM SCANNER';
    } else {
      setSimMode();
    }
  } catch(e) {
    setSimMode();
  }
}

function setSimMode() {
  liveMode = false;
  const pill = document.getElementById('live-pill');
  if (pill) { pill.textContent='SIM'; pill.className='live-pill sim'; }
  const ftMode = document.getElementById('ft-mode');
  if (ftMode) ftMode.textContent='SIMULATED (scanner offline)';
}

/* ── Init ────────────────────────────────────────────────────────── */
buildColumn(document.getElementById('col-hl'),   'HL',   HL_PAIRS,   'hl');
buildColumn(document.getElementById('col-mx'),   'MEXC', MEXC_PAIRS, 'mexc');
updateClock();
setInterval(updateClock, 30000);

let tick=0, scanNum=47;
render(tick, scanNum);
setInterval(() => {
  tick++;
  if (tick > MAX_TICK) { tick=0; scanNum++; }
  render(tick, scanNum);
}, 140);

fetchLive();
setInterval(fetchLive, 25000);
</script>
